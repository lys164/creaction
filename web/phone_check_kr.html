<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>폰 · Phone Peek (Light)</title>
<style>
:root {
  --bg: #eceae6; --paper: #f7f6f3; --card: #ffffff; --line: #e9e6e0;
  --ink: #201f1d; --sub: #8f8b83; --faint: #b8b4ac;
  --accent: #6f6a63; --sage: #a7b0a2; --clay: #c9a99a; --gold: #c9a24a;
  --hot: #d8746a; --ok: #93a98f;
  --sh: 0 10px 40px rgba(60,54,46,.10);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: "Pretendard", -apple-system, "Apple SD Gothic Neo", "PingFang TC", system-ui, sans-serif;
  background: linear-gradient(180deg, #e8e5df 0%, #ded9d1 100%); color: var(--ink); min-height: 100vh;
  -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
.stage { display: flex; flex-direction: column; align-items: center; padding: 26px 12px 60px; }
.demo-bar { width: min(410px, 100%); display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.demo-bar .title { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: .05em; }
.demo-bar .spacer { flex: 1; }
.lang-switch { display: inline-flex; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 2px; box-shadow: var(--sh); }
.lang-btn { border-radius: 999px; padding: 5px 13px; font-size: 12px; color: var(--sub); font-weight: 600; }
.lang-btn.active { background: var(--ink); color: #fff; }

/* Samsung One UI 機身:等寬窄邊框、居中打孔前鏡頭、底部手勢條 */
.phone { width: min(400px, 100vw - 16px); height: 812px; max-height: calc(100vh - 40px); min-height: 640px;
  border-radius: 34px; background: #000; border: 8px solid #141417;
  box-shadow: 0 40px 90px rgba(70,62,52,.30), 0 0 0 2px #adaba7, 0 0 0 3px rgba(255,255,255,.55);
  position: relative; overflow: hidden; display: flex; flex-direction: column; }
.punch { position: absolute; top: 13px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #060608; border-radius: 50%; z-index: 60;
  box-shadow: inset 0 0 2px 1px rgba(90,105,130,.55), 0 0 0 2px rgba(0,0,0,.3); }
.gesture-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 108px; height: 4px; border-radius: 2px; background: rgba(20,20,20,.26); z-index: 70; pointer-events: none; }
.screen { flex: 1; position: relative; overflow: hidden; border-radius: 26px; background: var(--paper); }
.view { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.view.show { display: flex; }
.statusbar { height: 50px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 5px; font-size: 15px; font-weight: 600; z-index: 50; letter-spacing: -0.02em; }
.statusbar .sb-time { font-variant-numeric: tabular-nums; }
.statusbar .sb-right { display: flex; align-items: center; gap: 6px; }
.statusbar .sb-ic { fill: currentColor; display: block; }
.statusbar .sb-batt { display: flex; align-items: center; gap: 1px; }
.sb-batt-shell { position: relative; width: 24px; height: 12px; border: 1px solid rgba(128,128,128,.45); border-radius: 3px; padding: 1px; box-sizing: border-box; }
.sb-batt-fill { display: block; height: 100%; border-radius: 1.5px; background: currentColor; }
.sb-batt-fill.low { background: #f5473d; }
.sb-batt-cap { width: 1.5px; height: 4px; border-radius: 0 1px 1px 0; background: rgba(128,128,128,.45); }
@media (max-height: 760px) { .phone { height: calc(100vh - 30px); } }
.hub { background: var(--paper); }
.hub-body { flex: 1; overflow: auto; padding: 6px 22px 34px; }
.hub-head { padding: 20px 2px 8px; }
.hub-eyebrow { font-size: 10.5px; letter-spacing: .32em; color: var(--faint); font-weight: 700; text-transform: uppercase; }
.hub-title { font-size: 25px; font-weight: 800; margin: 12px 0 8px; line-height: 1.35; letter-spacing: -0.02em; }
.hub-sub { font-size: 12.5px; color: var(--sub); line-height: 1.7; }
.ticket-pill { display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--line); color: var(--accent); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; margin-top: 18px; box-shadow: var(--sh); }
.ticket-pill b { color: var(--gold); }
.hub-card { margin-top: 16px; border-radius: 26px; overflow: hidden; position: relative; background: var(--card); cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: var(--sh); border: 1px solid var(--line); }
.hub-card:hover { transform: translateY(-3px); box-shadow: 0 18px 50px rgba(60,54,46,.16); }
.hub-card .cardbg { height: 168px; background-size: cover; background-position: center 22%; position: relative; }
.hub-card .genre { position: absolute; top: 14px; left: 14px; font-size: 10.5px; font-weight: 700; letter-spacing: .04em; padding: 5px 11px; border-radius: 999px; background: rgba(255,255,255,.82); backdrop-filter: blur(8px); color: var(--ink); }
.hub-card .newdot { position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 700; color: #fff; background: var(--clay); border-radius: 999px; padding: 4px 10px; }
.hub-card .cardmeta { padding: 15px 18px 17px; }
.hub-card .cname { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
.hub-card .chook { font-size: 12px; color: var(--sub); margin-top: 5px; line-height: 1.6; }
.hub-card .cstage { display: flex; align-items: center; gap: 9px; margin-top: 13px; }
.stage-track { flex: 1; height: 3px; border-radius: 2px; background: #ece9e3; overflow: hidden; }
.stage-fill { height: 100%; border-radius: 2px; background: var(--clay); }
.stage-label { font-size: 10px; color: var(--faint); white-space: nowrap; font-weight: 600; }
.hub-card .card-pass { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; color: var(--sub); background: rgba(60,54,46,.05); border: 1px dashed var(--faint); border-radius: 10px; padding: 5px 11px; letter-spacing: .03em; }
.hub-card .card-pass b { color: var(--ink); font-weight: 800; font-size: 13px; letter-spacing: .12em; }
.lockview { background-size: cover; background-position: center; }
.lockview::before { content: ""; position: absolute; inset: 0; backdrop-filter: blur(30px) brightness(1.08); background: rgba(247,246,243,.55); }
.lock-body { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; padding: 6px 24px 24px; overflow: auto; }
.lock-body > * { flex-shrink: 0; }
.lock-time { font-size: 62px; font-weight: 300; margin-top: 10px; letter-spacing: -0.01em; color: var(--ink); }
.lock-date { font-size: 13px; color: var(--sub); margin-top: -2px; font-weight: 600; }
.lock-face { width: 58px; height: 58px; border-radius: 50%; background-size: cover; background-position: center 20%; margin-top: 20px; box-shadow: 0 6px 18px rgba(60,54,46,.18); border: 2px solid #fff; }
.lock-msg { font-size: 12.5px; margin-top: 12px; color: var(--accent); text-align: center; line-height: 1.6; max-width: 260px; }
.pin-dots { display: flex; gap: 18px; margin: 20px 0 8px; }
.pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid var(--accent); transition: background .1s; }
.pin-dot.on { background: var(--accent); }
.pin-dots.err { animation: shake .35s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
.keypad { display: grid; grid-template-columns: repeat(3, 68px); gap: 16px 22px; margin-top: 6px; }
.key { width: 68px; height: 68px; border-radius: 50%; background: rgba(255,255,255,.7); border: 1px solid var(--line); font-size: 26px; font-weight: 400; color: var(--ink); display: flex; align-items: center; justify-content: center; transition: background .12s; }
.key:active { background: var(--ink); color: #fff; }
.key.ghostkey { background: transparent; border: none; font-size: 13px; font-weight: 600; color: var(--sub); }
.lock-back { position: absolute; top: 54px; left: 20px; font-size: 13px; color: var(--accent); z-index: 5; font-weight: 600; }

.unlock-flash { position: absolute; inset: 0; z-index: 80; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px; background: rgba(247,246,243,.94); backdrop-filter: blur(12px); }
.unlock-flash.show { display: flex; animation: fadein .3s; }
.gen-spinner { width: 26px; height: 26px; margin: 14px auto 2px; border: 3px solid rgba(0,0,0,.12); border-top-color: var(--clay,#c07a5b); border-radius: 50%; animation: spin 0.8s linear infinite; }
.gen-wait { opacity: .8; }
@keyframes spin { to { transform: rotate(360deg); } }
.upd-btn { position: absolute; top: 10px; right: 12px; z-index: 60; font-size: 11px; padding: 5px 10px; border-radius: 999px; border: none; background: rgba(20,20,24,.7); color: #fff; cursor: pointer; }
.upd-btn:disabled { opacity: .5; }
.ask-pin-btn { margin: 10px auto 0; display: block; font-size: 12px; padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.4); background: rgba(255,255,255,.12); color: #fff; cursor: pointer; backdrop-filter: blur(6px); }
.unlock-flash .big { font-size: 40px; }
.unlock-flash .t1 { font-size: 17px; font-weight: 800; }
.unlock-flash .t2 { font-size: 12px; color: var(--sub); }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.homeview { background-size: cover; background-position: center; }
.homeview::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(247,246,243,.62), rgba(240,237,231,.8)); backdrop-filter: blur(20px) brightness(1.05); }
.home-body { position: relative; flex: 1; overflow: auto; padding: 14px 20px 76px; display: flex; flex-direction: column; }
.home-exit-fab { position: absolute; right: 14px; bottom: 20px; z-index: 40; display: flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: #fff; background: rgba(20,18,28,.82); border: 1px solid rgba(255,255,255,.16); box-shadow: 0 6px 18px rgba(0,0,0,.28); padding: 10px 15px; border-radius: 999px; letter-spacing: -0.01em; }
.home-exit-fab:active { background: rgba(20,18,28,.95); }
.home-clue-fab { position: absolute; left: 14px; bottom: 20px; z-index: 40; display: flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 700; color: var(--ink); background: rgba(255,255,255,.9); border: 1px solid var(--line); box-shadow: 0 6px 18px rgba(60,54,46,.18); padding: 10px 15px; border-radius: 999px; }
.home-clue-fab b { color: var(--clay); }
.home-clue-fab.ready { background: var(--ink); color: #fff; }
.home-clue-fab.ready b { color: #ffd85e; }
.appgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px 8px; padding: 20px 4px; }
.appicon { display: flex; flex-direction: column; align-items: center; gap: 7px; position: relative; transition: transform .08s; }
.appicon:active { transform: scale(.9); }
.appicon .glyph { width: 58px; height: 58px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 4px 10px rgba(60,54,46,.14); position: relative; background: #fff; overflow: hidden; }
.appicon .label { font-size: 11px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.45); max-width: 76px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; letter-spacing: -0.01em; }
.appicon .badge { position: absolute; top: -6px; right: 8px; min-width: 19px; height: 19px; border-radius: 999px; background: #ff3b30; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; z-index: 3; box-shadow: 0 0 0 1.5px rgba(255,255,255,.85); }
.appicon .lockcover { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 14px; background: rgba(30,27,24,.42); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 2; }
/* brand glyphs */
.ic-emoji { font-size: 30px; line-height: 1; }
.ic-kko { color: #3A1D1D; font-weight: 900; font-size: 15px; font-style: italic; letter-spacing: -.5px; }
.ic-ig { width: 30px; height: 30px; border: 2.5px solid #fff; border-radius: 9px; position: relative; }
.ic-ig::before { content:""; position:absolute; top:50%; left:50%; width:13px; height:13px; border:2.5px solid #fff; border-radius:50%; transform:translate(-50%,-50%); }
.ic-ig::after { content:""; position:absolute; top:5px; right:5px; width:3px; height:3px; background:#fff; border-radius:50%; }
.ic-naver { color:#fff; font-weight:900; font-size:30px; font-family:Arial,sans-serif; transform:skewX(-4deg); }
.ic-yt { width:30px; height:21px; background:#fff; border-radius:7px; position:relative; }
.ic-yt::after { content:""; position:absolute; top:50%; left:52%; transform:translate(-50%,-50%); border-left:9px solid #FF0000; border-top:6px solid transparent; border-bottom:6px solid transparent; }
.ic-daangn { color:#fff; font-weight:800; font-size:26px; }
.ic-toss { color:#fff; font-weight:800; font-size:15px; letter-spacing:-.5px; }
.ic-health { color:#fb3958; font-size:30px; line-height:1; }
.ic-baemin { color:#fff; font-weight:800; font-size:15px; }
.ic-kakaot { color:#3A1D1D; font-weight:900; font-size:28px; font-style:italic; }
.ic-photos { width:30px; height:30px; border-radius:50%; background:conic-gradient(from 0deg,#f9c846,#f36c60,#e14a94,#8a5cf6,#4c9ff0,#39c07a,#f9c846); position:relative; }
.ic-photos::after { content:""; position:absolute; inset:9px; background:#fff; border-radius:50%; }
.ic-map { font-size:26px; }
.ic-phone { font-size:24px; filter:brightness(0) invert(1); }
.page-dots { display:flex; justify-content:center; gap:7px; padding:6px 0 2px; }
.page-dots i { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.4); }
.page-dots i.on { background:rgba(255,255,255,.95); }
.truth-card { margin-top: 14px; border-radius: 20px; padding: 16px; background: #fff; border: 1px solid var(--line); box-shadow: var(--sh); }
.truth-card.dim { opacity: .6; }
.truth-card .tc-top { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--clay); }
.truth-card .tc-sub { font-size: 11.5px; color: var(--sub); margin-top: 6px; line-height: 1.65; }
.truth-card .tc-cta { margin-top: 12px; width: 100%; border-radius: 13px; background: var(--ink); color: #fff; font-weight: 700; font-size: 13px; padding: 11px 0; }
.truth-card .tc-cta:disabled { opacity: .35; cursor: default; }
.appview { background: var(--paper); color: var(--ink); }
.appview .statusbar { color: var(--ink); }
.app-nav { display: flex; align-items: center; gap: 10px; padding: 4px 14px 10px; background: var(--paper); flex-shrink: 0; border-bottom: 1px solid transparent; }
.app-nav .backbtn { font-size: 22px; font-weight: 400; color: var(--accent); display: flex; align-items: center; gap: 3px; line-height: 1; padding: 9px 10px 9px 2px; margin: -9px 0; }
.app-nav .backbtn .bk-tx { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.app-nav .app-title { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
.app-exit-fab { position: absolute; right: 14px; bottom: 20px; z-index: 40; display: flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: #fff; background: rgba(20,18,28,.82); border: 1px solid rgba(255,255,255,.16); box-shadow: 0 6px 18px rgba(0,0,0,.28); padding: 10px 15px; border-radius: 999px; letter-spacing: -0.01em; }
.app-exit-fab:active { background: rgba(20,18,28,.95); }
.app-nav .subtag { margin-left: auto; font-size: 10.5px; color: var(--faint); }
.app-nav .nav-actions { margin-left: auto; display: flex; gap: 15px; font-size: 17px; color: var(--accent); opacity: .85; }
/* branded headers */
.app-nav.brand { color: #fff; border-bottom: none; }
.app-nav.brand .backbtn, .app-nav.brand .app-title, .app-nav.brand .nav-actions { color: #fff; }
.app-nav.kakao { background: #b2c7d9; padding-bottom: 8px; }
.app-nav.kakao .app-title, .app-nav.kakao .backbtn, .app-nav.kakao .nav-actions { color: #1a1a1a; }
.app-nav.kakao.list { background: #fff; border-bottom: 1px solid #eef0f2; }
.app-nav.naver { background: #03C75A; }
.app-nav.baemin { background: #2AC1BC; }
.app-nav.daangn { background: #FF6F0F; }
.app-nav.toss { background: #0064FF; }
.app-nav.ig { background: #fff; border-bottom: 1px solid #efefef; }
.app-nav.yt { background: #fff; border-bottom: 1px solid #eee; }
.app-nav.dark { background: #1c1c22; }
.app-nav.dark .app-title, .app-nav.dark .backbtn, .app-nav.dark .nav-actions { color: #fff; }
.appview.tinted .app-body { background: transparent; }
.app-body { flex: 1; overflow: auto; padding-bottom: 88px; }
.sec-label { padding: 16px 20px 7px; font-size: 11px; font-weight: 700; color: var(--faint); letter-spacing: .06em; }
.row-item { background: var(--card); margin: 0 14px 8px; border-radius: 16px; padding: 14px 16px; border: 1px solid var(--line); cursor: pointer; transition: background .12s; }
.row-item:active { background: #faf9f6; }
.row-top { display: flex; align-items: baseline; gap: 8px; }
.row-title { font-size: 13.5px; font-weight: 600; flex: 1; min-width: 0; line-height: 1.5; }
.row-time { font-size: 10.5px; color: var(--faint); white-space: nowrap; }
.row-sub { font-size: 12px; color: var(--sub); margin-top: 4px; line-height: 1.55; }
.row-detail { display: none; margin-top: 11px; font-size: 12px; line-height: 1.7; background: #f4f2ec; border-radius: 12px; padding: 11px 13px; color: var(--accent); white-space: pre-wrap; }
.row-item.open .row-detail { display: block; }
.row-item.hotrow .row-title::after { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--clay); margin-left: 6px; vertical-align: 1px; }

/* chat (kakao-ish, light) */
.chat-list-item { display: flex; gap: 12px; align-items: center; background: var(--card); margin: 0 14px 8px; border-radius: 16px; padding: 13px 15px; border: 1px solid var(--line); cursor: pointer; }
.chat-face { width: 46px; height: 46px; border-radius: 16px; background: #efece6; display: flex; align-items: center; justify-content: center; font-size: 21px; flex-shrink: 0; background-size: cover; background-position: center 20%; }
.chat-meta { flex: 1; min-width: 0; }
.chat-name { font-size: 13.5px; font-weight: 800; }
.chat-name .youtag { font-size: 9px; font-weight: 800; color: #fff; background: var(--clay); border-radius: 5px; padding: 1px 5px; margin-left: 5px; vertical-align: 1px; }
.chat-last { font-size: 12px; color: var(--sub); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.chat-time { font-size: 10px; color: var(--faint); }
.chat-unread { min-width: 17px; height: 17px; border-radius: 999px; background: var(--hot); color: #fff; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
.chat-searchbar { display: flex; align-items: center; gap: 9px; margin: 10px 14px 4px; padding: 9px 13px; background: #f1f2f4; border-radius: 12px; }
.chat-searchbar .csb-ic { font-size: 13px; color: #9a9ea6; }
.chat-searchbar input { flex: 1; border: none; background: transparent; outline: none; font: inherit; font-size: 13px; color: #1a1a1a; }
.chat-searchbar input::placeholder { color: #b0b4bb; }
.chat-searchbar .csb-x { font-size: 13px; color: #b0b4bb; cursor: pointer; }
.chat-search-hint { padding: 4px 20px 2px; font-size: 10.5px; color: var(--faint); }
.chat-search-hint b { color: var(--accent); }
.chat-hl { background: #ffe94a; color: #3a1d1d; border-radius: 3px; padding: 0 1px; font-weight: 700; }
.chat-folderbar { display: flex; gap: 7px; padding: 10px 14px 9px; background: #fff; border-bottom: 1px solid #f1f1f1; }
.chat-folder { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px; min-height: 31px; padding: 6px 10px; border-radius: 999px; background: #f4f4f6; color: #777; font-size: 11px; font-weight: 700; border: 1px solid transparent; }
.chat-folder.active { background: #FEE500; color: #3A1D1D; border-color: #f1d600; }
.chat-folder .folder-count { min-width: 14px; height: 14px; padding: 0 3px; border-radius: 999px; background: rgba(58,29,29,.12); color: inherit; font-size: 9px; line-height: 14px; text-align: center; }
.chat-folder.active .folder-count { background: rgba(58,29,29,.16); }
.chat-folder-note { padding: 7px 17px 3px; background: #fff; color: #939393; font-size: 10.5px; line-height: 1.5; }
.chat-empty { margin: 34px 22px; padding: 22px 16px; text-align: center; background: #f8f8fa; border-radius: 16px; color: #999; font-size: 12px; line-height: 1.65; }
.pinic, .mutedic, .archiveic { display: inline-block; margin-left: 5px; font-size: 10px; vertical-align: 1px; }
.pinic { filter: grayscale(1); opacity: .75; }
.mutedic, .archiveic { opacity: .6; }
.me-tag { font-size: 10px; color: #6b5bd2; font-weight: 700; }
.kko-list { background: #fff; }
.talkroom { background: #b2c7d9; flex: 1; overflow: auto; padding: 8px 12px 16px; }
.kko-date { text-align: center; margin: 8px auto 12px; font-size: 11px; color: #fff; background: rgba(0,0,0,.16); border-radius: 999px; padding: 4px 14px; width: fit-content; }
.kko-note { text-align: center; margin: 0 auto 12px; font-size: 10.5px; color: #4a5560; background: rgba(255,255,255,.55); border-radius: 8px; padding: 5px 12px; width: fit-content; max-width: 90%; line-height: 1.5; }
.kko-sys { text-align: center; font-size: 10.5px; color: #4a5560; background: rgba(0,0,0,.1); border-radius: 999px; padding: 5px 13px; width: fit-content; margin: 10px auto; line-height: 1.5; max-width: 88%; }

.bubble-stack { max-width: 68%; display: flex; flex-direction: column; gap: 3px; }
.bubble-name { font-size: 11px; color: #40484f; margin: 1px 0 2px 2px; }
.bubble { border-radius: 3px 16px 16px 16px; background: #fff; color: #1a1a1a; padding: 8px 11px; font-size: 13px; line-height: 1.5; width: fit-content; white-space: pre-wrap; word-break: break-word; }
.mine .bubble { background: #FEE500; border-radius: 16px 3px 16px 16px; align-self: flex-end; }
.bubble.voicebub { display: flex; align-items: center; gap: 8px; color: #555; }
.bubble.voicebub .pl { width: 24px; height: 24px; border-radius: 50%; background: #6b5bd2; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }

.kko-input { display: flex; align-items: center; gap: 10px; background: #fff; padding: 9px 14px; flex-shrink: 0; border-top: 1px solid #eee; }
.kko-plus { font-size: 20px; color: #888; }
.kko-inputfield { flex: 1; background: #f3f3f5; border-radius: 18px; padding: 9px 14px; font-size: 12.5px; color: #b0aeb8; }
.kko-draftfield { flex: 1; background: #fffbe6; border: 1px solid #f5e08a; border-radius: 18px; padding: 9px 14px; font-size: 12.5px; color: #55506a; white-space: pre-wrap; }

@keyframes blink { 50% { opacity: 0; } }
.kko-send { font-size: 18px; color: #b0aeb8; }

.draft-flag { background: #fff; padding: 7px 14px; font-size: 10px; font-weight: 800; color: var(--hot); letter-spacing: .05em; border-top: 1px dashed #f0dfb0; flex-shrink: 0; }
.bub-time { font-size: 9.5px; color: #6f7b89; align-self: flex-end; }

.draft-strip { background: var(--card); border-top: 1px solid var(--line); padding: 11px 15px; flex-shrink: 0; }
.draft-label { font-size: 10px; font-weight: 800; color: var(--hot); letter-spacing: .05em; }
.draft-text { margin-top: 6px; font-size: 12.5px; color: var(--accent); background: #f4f2ec; border-radius: 11px; padding: 10px 12px; line-height: 1.6; white-space: pre-wrap; }

/* voice memo (metadata-first + waveform) */
.vm-item { background: var(--card); margin: 8px 14px; border-radius: 18px; padding: 15px 16px; cursor: pointer; border: 1px solid var(--line); }
.vm-top { display: flex; align-items: center; gap: 11px; }
.vm-play { width: 36px; height: 36px; border-radius: 50%; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.vm-name { font-size: 13px; font-weight: 800; flex: 1; }
.vm-len { font-size: 10.5px; color: var(--faint); }
.vm-meta { font-size: 11px; color: var(--sub); margin-top: 5px; }
.vm-wave { display: flex; gap: 2px; align-items: center; height: 30px; margin: 12px 0 2px; }
.vm-wave i { flex: 1; background: #ddd8cf; border-radius: 2px; min-height: 3px; }
.vm-item.playing .vm-wave i { background: var(--clay); }
.vm-locked-note { font-size: 11px; color: var(--gold); margin-top: 10px; display: flex; align-items: center; gap: 6px; font-weight: 600; }
.vm-script { display: none; font-size: 12px; line-height: 1.75; color: var(--accent); background: #f4f2ec; border-radius: 12px; padding: 12px 13px; margin-top: 11px; white-space: pre-wrap; }

/* gallery */
.gal-tabs { display: flex; gap: 8px; padding: 10px 16px 4px; }
.gal-tab { flex: 1; padding: 9px; border-radius: 12px; font-size: 12px; font-weight: 700; background: var(--card); color: var(--sub); border: 1px solid var(--line); }
.gal-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.gal-note { padding: 8px 18px 4px; font-size: 11.5px; color: var(--sub); }
.gal-note b { color: var(--hot); }
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 6px; }
.ph { aspect-ratio: 1; position: relative; overflow: hidden; cursor: pointer; background: #e6e2da; border-radius: 8px; }
.ph .phbg { position: absolute; inset: 0; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 30px; }
.ph .phcap { position: absolute; left: 0; right: 0; bottom: 0; font-size: 8.5px; padding: 12px 5px 4px; color: #fff; background: linear-gradient(transparent, rgba(0,0,0,.6)); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ph .phcount { position: absolute; top: 5px; right: 6px; font-size: 8.5px; font-weight: 700; color: #fff; background: rgba(0,0,0,.4); border-radius: 999px; padding: 1px 6px; }
.ph.lockph .phbg { filter: blur(15px) saturate(1.2); transform: scale(1.15); }
.ph .phlock { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #fff; font-size: 18px; background: rgba(40,36,32,.28); }
.ph .phlock span { font-size: 9px; font-weight: 800; background: rgba(0,0,0,.5); border-radius: 999px; padding: 2px 8px; }
.ph .phcountdown { position: absolute; top: 5px; left: 6px; font-size: 8px; font-weight: 800; color: #fff; background: var(--hot); border-radius: 999px; padding: 1px 6px; }
.lightbox { position: absolute; inset: 0; z-index: 70; background: rgba(30,27,24,.96); display: none; flex-direction: column; }
.lightbox.show { display: flex; }
.lb-close { position: absolute; top: 56px; right: 20px; color: #fff; font-size: 22px; z-index: 3; }
.lb-img { flex: 1; margin: 74px 20px 0; border-radius: 16px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 64px; max-height: 52%; }
.lb-cap { padding: 20px 24px 40px; }
.lb-cap .c1 { font-size: 14px; font-weight: 800; color: #fff; line-height: 1.5; }
.lb-cap .c2 { font-size: 12px; color: #cbc6bd; margin-top: 8px; line-height: 1.75; white-space: pre-wrap; }

/* screentime */

.st-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.st-app { width: 84px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.st-track { flex: 1; height: 12px; border-radius: 6px; background: #efece6; overflow: hidden; }
.st-fill { height: 100%; border-radius: 6px; }
.st-val { width: 78px; text-align: right; color: var(--sub); font-size: 11px; }
.st-insight { background: var(--card); margin: 0 14px 12px; border-radius: 20px; padding: 6px 16px; border: 1px solid var(--line); }
.st-insight .in-line { font-size: 12.5px; line-height: 1.6; padding: 11px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
.st-insight .in-line:last-child { border-bottom: none; }
.st-insight .row-detail { margin-top: 8px; }
.st-store { background: var(--card); margin: 0 14px 12px; border-radius: 20px; padding: 8px 16px; border: 1px solid var(--line); }
.st-store-head { display:flex; align-items:center; justify-content:space-between; padding:8px 0 7px; font-size:11px; color:var(--faint); font-weight:700; letter-spacing:.05em; }

.st-store-icon { width:34px; height:34px; border-radius:10px; background:#edf1ff; display:flex; align-items:center; justify-content:center; font-size:17px; flex:none; }
.st-store-copy { flex:1; min-width:0; }
.st-store-copy b { display:block; font-size:12.5px; }
.st-store-copy span { display:block; margin-top:2px; font-size:10.5px; color:var(--sub); }
.st-store-time { font-size:10px; color:var(--faint); white-space:nowrap; }

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

/* sns (Instagram) */
.ig-body { background: #fff; }

.ig-cm { font-size: 12.5px; line-height: 1.5; color: #333; display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px; }

.ig-cm span { color: #4a4a4a; min-width: 0; }
.ig-cm .ig-cm-like { margin-left: auto; font-size: 10.5px; color: #b0b0b0; font-style: normal; white-space: nowrap; }
.ig-cm.hot { background: linear-gradient(90deg,rgba(232,48,106,.06),transparent); border-radius: 8px; padding: 3px 6px; margin: 0 -6px; }

/* search (Naver) */

.nv-result-empty { font-size: 12.5px; color: #6a7078; line-height: 1.7; margin-top: 7px; }
.nv-sugg { display: flex; align-items: center; gap: 11px; padding: 12px 16px; border-bottom: 1px solid #f4f4f4; cursor: pointer; font-size: 13.5px; color: #262626; }

.hl-hero { background: var(--card); margin: 8px 14px 4px; border-radius: 20px; padding: 18px; border: 1px solid var(--line); }
.hl-ring { display: flex; align-items: center; gap: 16px; }
.hl-big { font-size: 30px; font-weight: 800; }

.hl-note { font-size: 11.5px; color: var(--sub); margin-top: 4px; line-height: 1.5; }

/* folder (2nd-level password) */
.fd-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px 14px; }
.fd-item { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px 14px; cursor: pointer; text-align: center; position: relative; }
.fd-icon { font-size: 34px; }
.fd-name { font-size: 12.5px; font-weight: 700; margin-top: 8px; }
.fd-count { font-size: 10.5px; color: var(--faint); margin-top: 2px; }
.fd-item .fd-lock2 { position: absolute; top: 10px; right: 11px; font-size: 13px; }
.fd-pass { padding: 22px; text-align: center; }
.fd-pass .fp-t { font-size: 14px; font-weight: 800; margin-top: 10px; }
.fd-pass .fp-sub { font-size: 12px; color: var(--sub); margin-top: 6px; line-height: 1.6; }
.fd-pass .fp-dots { display: flex; gap: 14px; justify-content: center; margin: 18px 0; }
.fd-pass .fp-dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid var(--accent); }
.fd-pass .fp-dot.on { background: var(--accent); }
.fd-keypad { display: grid; grid-template-columns: repeat(3, 60px); gap: 12px 18px; justify-content: center; }
.fd-key { width: 60px; height: 60px; border-radius: 50%; background: var(--card); border: 1px solid var(--line); font-size: 22px; display: flex; align-items: center; justify-content: center; }
.fd-key:active { background: var(--ink); color: #fff; }
.fd-doc { background: var(--card); margin: 8px 14px; border-radius: 16px; padding: 14px 16px; border: 1px solid var(--line); cursor: pointer; }

/* footprints / map */
.map-wrap { margin: 12px 14px; border-radius: 20px; overflow: hidden; border: 1px solid var(--line); background: #e9ece8; position: relative; height: 190px; }
.map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(120,130,120,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(120,130,120,.1) 1px, transparent 1px); background-size: 26px 26px; }
/* 地圖裝飾層：道路/河流/綠地，提升「像地圖」的質感（純 CSS） */
.map-road { position: absolute; background: #fff; box-shadow: 0 0 0 1px rgba(120,130,120,.14); }
.map-road.h { left: -4px; right: -4px; height: 9px; border-radius: 2px; }
.map-road.v { top: -4px; bottom: -4px; width: 9px; border-radius: 2px; }
.map-river { position: absolute; top: -30px; bottom: -30px; width: 30px; background: #d3e2e5; transform: rotate(16deg); opacity: .85; }
.map-park { position: absolute; border-radius: 10px; background: #dde7d4; opacity: .9; }
.map-blocks { position: absolute; border-radius: 4px; background: rgba(255,255,255,.45); border: 1px solid rgba(120,130,120,.12); }
.map-pin { position: absolute; transform: translate(-50%,-100%); font-size: 22px; cursor: pointer; }
.map-pin .pin-lbl { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 8.5px; font-weight: 700; background: rgba(255,255,255,.9); border-radius: 6px; padding: 1px 6px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
.map-pin.hot { animation: pinpulse 1.6s infinite; }
@keyframes pinpulse { 0%,100% { transform: translate(-50%,-100%) scale(1); } 50% { transform: translate(-50%,-100%) scale(1.2); } }
.trip-item { background: var(--card); margin: 0 14px 8px; border-radius: 16px; padding: 13px 15px; border: 1px solid var(--line); cursor: pointer; }
.trip-top { display: flex; align-items: baseline; gap: 8px; }
.trip-route { font-size: 13px; font-weight: 700; flex: 1; }
.trip-time { font-size: 10.5px; color: var(--faint); }
.trip-sub { font-size: 11.5px; color: var(--sub); margin-top: 4px; line-height: 1.55; }
.trip-detail { display: none; margin-top: 10px; font-size: 12px; line-height: 1.7; background: #f4f2ec; border-radius: 12px; padding: 11px 13px; color: var(--accent); white-space: pre-wrap; }
.trip-item.open .trip-detail { display: block; }

/* feed (algorithmic recommendation stream) */
.feed-tabnote { padding: 12px 18px 4px; font-size: 11.5px; color: var(--sub); line-height: 1.6; }
.feed-card { background: var(--card); margin: 0 14px 10px; border-radius: 18px; overflow: hidden; border: 1px solid var(--line); }
.feed-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
.feed-cap { padding: 11px 14px; }
.feed-src { font-size: 10px; color: var(--faint); font-weight: 700; letter-spacing: .04em; }
.feed-txt { font-size: 12.5px; margin-top: 4px; line-height: 1.55; }
.feed-why { font-size: 10.5px; color: var(--clay); margin-top: 7px; font-weight: 600; }
.toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(20px); background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: 16px; padding: 12px 17px; font-size: 12px; opacity: 0; pointer-events: none; transition: .3s; z-index: 90; width: max-content; max-width: 85%; box-shadow: 0 14px 40px rgba(60,54,46,.2); line-height: 1.55; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast b { color: var(--gold); }

/* ── One UI dock(底欄常駐 4 App,無標籤) ── */
.dock { margin-top: auto; background: rgba(255,255,255,.5); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.65); border-radius: 26px; padding: 12px 6px; display: grid; grid-template-columns: repeat(4, 1fr); }
.dock .appicon .label { display: none; }
.dock .appicon .glyph { width: 54px; height: 54px; }
.mutedic { font-size: 10px; opacity: .55; margin-left: 4px; }
.pinic { font-size: 9px; opacity: .55; margin-left: 3px; }

/* ── purchase(쿠팡 Coupang) ── */
.app-nav.coupang { background: #fff; border-bottom: 1px solid #f0f0f0; }
.app-nav.coupang .backbtn, .app-nav.coupang .nav-actions { color: #111; }
.cp-logo { font-weight: 900; font-size: 18px; letter-spacing: -.5px; font-family: Arial, sans-serif; }
.cp-logo i { font-style: normal; }
.cp-logo i:nth-child(1){color:#E52528}.cp-logo i:nth-child(2){color:#F79433}.cp-logo i:nth-child(3){color:#FBC91D}.cp-logo i:nth-child(4){color:#00A862}.cp-logo i:nth-child(5){color:#0074C8}.cp-logo i:nth-child(6){color:#8B57A2}.cp-logo i:nth-child(7){color:#E52528}
.cp-order { background: #fff; margin: 0 14px 10px; border: 1px solid #ececec; border-radius: 14px; padding: 14px 15px; cursor: pointer; }
.cp-head { display: flex; justify-content: space-between; align-items: baseline; }
.cp-date { font-size: 11px; color: #888; font-weight: 600; }
.cp-status { font-size: 12px; font-weight: 800; color: #00891a; }
.cp-status.s2 { color: #0073e9; }
.cp-prod { display: flex; gap: 12px; margin-top: 10px; }
.cp-thumb { width: 54px; height: 54px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 25px; }
.cp-name { font-size: 13px; line-height: 1.45; color: #111; }
.cp-price { font-size: 13.5px; font-weight: 800; margin-top: 3px; color: #111; }
.cp-rocket { font-size: 9.5px; font-weight: 800; color: #00aaf0; margin-left: 4px; }
.cp-note { font-size: 10.5px; color: #e8590c; margin-top: 4px; font-weight: 600; }
.cp-addr { margin-top: 9px; font-size: 11px; color: #666; background: #f7f8fa; border-radius: 8px; padding: 7px 9px; }
.cp-track { display: flex; align-items: flex-start; margin-top: 12px; }
.cp-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; color: #c0c0c0; }
.cp-step .dt { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; }
.cp-step.on { color: #0073e9; font-weight: 700; }
.cp-step.on .dt { background: #0073e9; }
.cp-tln { flex: 1; height: 1.5px; background: #eee; margin-top: 3px; max-width: 26px; }
.cp-order .row-detail, .bm-order .row-detail, .tx-trip .row-detail { display: none; }
.cp-order.open .row-detail, .bm-order.open .row-detail, .tx-trip.open .row-detail { display: block; }

/* ── delivery(배달의민족 Baemin) ── */
.bm-order { background: #fff; margin: 0 14px 10px; border: 1px solid #ececec; border-radius: 16px; padding: 14px 15px; cursor: pointer; }
.bm-shop { display: flex; align-items: center; gap: 9px; font-size: 13.5px; font-weight: 800; color: #222; }
.bm-emo { width: 38px; height: 38px; border-radius: 10px; background: #f4f4f4; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
.bm-time { margin-left: auto; font-size: 10px; color: #aaa; font-weight: 500; }
.bm-items { font-size: 12px; color: #333; margin-top: 9px; line-height: 1.5; }
.bm-serv { display: inline-block; font-size: 10px; font-weight: 800; color: #2AC1BC; border: 1px solid #2AC1BC; border-radius: 5px; padding: 1px 6px; margin-right: 6px; vertical-align: 1px; }
.bm-serv.warn { color: #e8590c; border-color: #e8590c; }
.bm-addr { font-size: 11px; color: #888; margin-top: 6px; }
.bm-memo { margin-top: 8px; font-size: 11.5px; background: #f0fbfa; border: 1px solid #cdeeec; border-radius: 10px; padding: 8px 10px; color: #0e7d79; line-height: 1.55; }
.bm-foot { display: flex; justify-content: space-between; margin-top: 9px; font-size: 11px; color: #999; }
.bm-foot b { color: #111; font-size: 12.5px; }

/* ── taxi(카카오 T) ── */
.app-nav.kakaot { background: #FAE100; }
.app-nav.kakaot .backbtn, .app-nav.kakaot .app-title { color: #191919; }
.tx-trip { background: #fff; margin: 0 14px 10px; border: 1px solid #ececec; border-radius: 16px; padding: 14px 15px; cursor: pointer; }
.tx-time { font-size: 10.5px; color: #999; font-weight: 600; margin-bottom: 9px; }
.tx-pt { display: flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 600; color: #222; }
.tx-pt .dt { width: 7px; height: 7px; border-radius: 50%; background: #0064ff; flex-shrink: 0; }
.tx-pt.dest .dt { background: #e8412f; }
.tx-pt.way .dt { background: #f5a623; width: 6px; height: 6px; }
.tx-line { width: 1.5px; height: 11px; background: #ddd; margin: 2px 0 2px 2.7px; }
.tx-way-flag { font-size: 9.5px; color: #e8590c; font-weight: 800; margin-left: 4px; }
.tx-meta { display: flex; gap: 8px; margin-top: 11px; align-items: center; }
.tx-pay { font-size: 9.5px; border: 1px solid #e5e5e5; border-radius: 5px; padding: 2px 7px; color: #666; }
.tx-pay.odd { color: #e8412f; border-color: #f5c6c0; background: #fff5f4; font-weight: 700; }
.tx-fare { margin-left: auto; font-size: 13.5px; font-weight: 800; color: #191919; }

/* ── calls(Samsung 전화:排行+最近記錄) ── */
.cl-stats { background: var(--card); margin: 12px 14px; border-radius: 20px; padding: 16px; border: 1px solid var(--line); }
.cl-stat-title { font-size: 11px; font-weight: 800; color: var(--faint); letter-spacing: .06em; }
.cl-rank { display: flex; align-items: center; gap: 9px; margin-top: 12px; font-size: 12px; flex-wrap: wrap; cursor: pointer; }
.cl-rank .nm { width: 96px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cl-rank .bar { flex: 1; height: 10px; border-radius: 5px; background: #efece6; overflow: hidden; }
.cl-rank .bar i { display: block; height: 100%; border-radius: 5px; background: var(--sage); min-width: 2px; }
.cl-rank.hot .bar i { background: var(--clay); }
.cl-rank .dur { width: 86px; text-align: right; color: var(--sub); font-size: 10.5px; }
.cl-rank .cl-rankno { width: 15px; font-size: 11px; font-weight: 800; color: var(--faint); text-align: center; flex-shrink: 0; }
.cl-rank.hot .cl-rankno { color: var(--clay); }
.cl-zero-head { margin-top: 13px; padding-top: 12px; border-top: 1px dashed var(--line); font-size: 10px; font-weight: 700; color: var(--faint); letter-spacing: .04em; }
.cl-zero { display: flex; align-items: center; gap: 9px; margin-top: 9px; font-size: 11.5px; flex-wrap: wrap; cursor: pointer; }
.cl-zero .cl-zero-ic { width: 18px; text-align: center; color: var(--faint); font-size: 13px; flex-shrink: 0; }
.cl-zero.hot .cl-zero-ic { color: var(--clay); }
.cl-zero .cl-zero-meta { flex: 1; min-width: 0; }
.cl-zero .cl-zero-nm { font-weight: 700; color: var(--sub); }
.cl-zero.hot .cl-zero-nm { color: var(--ink); }
.cl-zero .cl-zero-sub { font-size: 10.5px; color: var(--faint); margin-top: 2px; line-height: 1.5; }
.cl-zero .cl-zero-tag { margin-left: auto; font-size: 10px; font-weight: 700; color: #b0794f; background: #f6ede2; border-radius: 999px; padding: 3px 9px; white-space: nowrap; }
.cl-zero.hot .cl-zero-tag { color: #b23b30; background: #fbeae7; }
.cl-zero .row-detail { margin-top: 10px; }
.cl-diric { font-weight: 700; }
.cl-diric.in { color: #4c7a4f; }
.cl-diric.out { color: #3b5d8f; }
.cl-diric.miss, .cl-diric.cancel { color: #c0392b; }
.cl-rank .row-detail, .cl-item .row-detail, .ts-txn .row-detail { display: none; flex-basis: 100%; }
.cl-rank.open .row-detail, .cl-item.open .row-detail, .ts-txn.open .row-detail { display: block; }
.cl-item { display: flex; align-items: center; gap: 11px; background: var(--card); margin: 0 14px 7px; border-radius: 14px; padding: 12px 14px; border: 1px solid var(--line); cursor: pointer; flex-wrap: wrap; }
.cl-dir { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; background: #eaf2ec; color: #4c7a4f; flex-shrink: 0; }
.cl-dir.out { background: #e9eef6; color: #3b5d8f; }
.cl-dir.miss { background: #f8e9e7; color: #c0392b; }
.cl-meta { flex: 1; min-width: 0; }
.cl-name { font-size: 13px; font-weight: 700; }
.cl-sub { font-size: 10.5px; color: var(--sub); margin-top: 2px; }
.cl-time { font-size: 10px; color: var(--faint); }

/* ── ledger(토스 Toss 記帳) ── */
.ts-hero { background: #fff; margin: 12px 14px; border-radius: 20px; padding: 18px; border: 1px solid #eef0f4; }
.ts-month { font-size: 11px; color: #8b95a1; font-weight: 700; }
.ts-total { font-size: 27px; font-weight: 800; margin-top: 4px; letter-spacing: -.02em; color: #191f28; }
.ts-note { font-size: 11px; color: #8b95a1; margin-top: 5px; line-height: 1.5; }
.ts-txn { display: flex; gap: 11px; background: #fff; margin: 0 14px 7px; border-radius: 14px; padding: 13px 15px; border: 1px solid #eef0f4; cursor: pointer; flex-wrap: wrap; align-items: center; }
.ts-cat { width: 36px; height: 36px; border-radius: 50%; background: #f2f4f6; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.ts-meta { flex: 1; min-width: 0; }
.ts-t { font-size: 13px; font-weight: 600; color: #191f28; }
.ts-memo { font-size: 11px; color: #4e5968; margin-top: 4px; background: #f7f8fa; border-radius: 7px; padding: 3px 8px; display: inline-block; }
.ts-memo.hot { color: #c0392b; background: #fdf1ef; }
.ts-right { text-align: right; }
.ts-amt { font-size: 13px; font-weight: 800; white-space: nowrap; color: #333d4b; }
.ts-time { font-size: 9.5px; color: #b0b8c1; margin-top: 3px; }

.modal-wrap { position: absolute; inset: 0; z-index: 100; background: rgba(40,36,32,.4); backdrop-filter: blur(4px); display: none; align-items: flex-end; }
.modal-wrap.show { display: flex; }
.modal { width: 100%; background: var(--paper); border-radius: 30px 30px 0 0; padding: 24px 22px 30px; max-height: 80%; overflow: auto; animation: slideup .3s; }
@keyframes slideup { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal .m-emoji { font-size: 34px; text-align: center; }
.modal .m-title { font-size: 17px; font-weight: 800; text-align: center; margin-top: 10px; }
.modal .m-body { font-size: 12.5px; color: var(--sub); line-height: 1.75; margin-top: 10px; text-align: center; white-space: pre-wrap; }
.modal .m-body b { color: var(--gold); }
.modal .truth-text { text-align: left; background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 15px; color: var(--ink); margin-top: 16px; font-size: 13px; line-height: 1.85; white-space: pre-wrap; }
.modal .next-drop { margin-top: 14px; border-radius: 16px; background: #fff; border: 1px solid var(--line); padding: 13px 15px; }
.modal .next-drop .nd-tag { font-size: 10.5px; font-weight: 800; color: var(--clay); letter-spacing: .06em; }
.modal .next-drop .nd-text { font-size: 12.5px; margin-top: 6px; line-height: 1.65; }
.modal .nd-timer { font-size: 11px; color: var(--sub); margin-top: 8px; }
.modal .m-cta { width: 100%; margin-top: 18px; border-radius: 14px; padding: 14px 0; font-size: 14px; font-weight: 800; background: var(--gold); color: #241d07; }
.modal .m-cta.dark { background: var(--ink); color: #fff; }
.modal .m-cta.danger { background:#bd3f36; color:#fff; }
.modal .m-sub-cta { width: 100%; margin-top: 8px; padding: 10px 0; font-size: 12px; color: var(--sub); }
.risk-modal .risk-source { display:flex; align-items:center; gap:9px; padding:12px 13px; border-radius:15px; background:#fff2ef; border:1px solid #f4d2cb; text-align:left; }
.risk-modal .risk-source i { width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:#ffddcf; color:#ad3b31; font-style:normal; }
.risk-modal .risk-source b { display:block; font-size:12px; }
.risk-modal .risk-source span { display:block; margin-top:2px; color:var(--sub); font-size:11px; }
.risk-clock { display:flex; align-items:baseline; justify-content:center; gap:5px; margin:18px 0 6px; color:#b33c33; }
.risk-clock b { font-size:46px; letter-spacing:-.06em; line-height:1; }
.risk-clock span { font-size:12px; font-weight:800; }
.risk-note { text-align:center; color:var(--sub); font-size:11.5px; line-height:1.6; }
.mirror-card { display:flex; align-items:center; gap:11px; margin-top:12px; padding:14px 15px; border:1px solid #dfece5; border-radius:18px; background:linear-gradient(135deg,#f7fffa,#eff8f2); cursor:pointer; }
.mirror-card .mi { width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:12px; background:#fff; font-size:17px; box-shadow:0 2px 6px rgba(47,105,72,.08); }
.mirror-card b { display:block; font-size:12.5px; color:#285d3b; }
.mirror-card span { display:block; margin-top:3px; color:#6d8875; font-size:10.5px; }
.mirror-card .go { margin-left:auto; color:#4f8e61; font-size:16px; }
.price-cards { display: flex; gap: 8px; margin-top: 16px; }
.price-card { flex: 1; border: 1px solid var(--line); border-radius: 16px; padding: 14px 8px; text-align: center; cursor: pointer; background: #fff; }
.price-card.best { border-color: var(--gold); position: relative; }
.price-card.best::before { content: "BEST"; position: absolute; top: -8px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #241d07; font-size: 9px; font-weight: 800; border-radius: 999px; padding: 1px 8px; }
.price-card .pc-n { font-size: 15px; font-weight: 800; }
.price-card .pc-p { font-size: 11px; color: var(--sub); margin-top: 4px; }
.clue-list-item { display: flex; gap: 11px; padding: 12px 0; border-bottom: 1px solid var(--line); align-items: flex-start; }
.clue-list-item .ci { font-size: 16px; }
.clue-list-item .ct { font-size: 12.5px; line-height: 1.65; }
.clue-list-item.pending { opacity: .4; }
.clue-list-item .ct b { color: var(--clay); }

/* ── 음악(멜론풍 플레이리스트) ── */
.app-nav.melon { background: #fff; border-bottom: 1px solid #eef5ee; }
.app-nav.melon .backbtn, .app-nav.melon .nav-actions { color: #1a1a1a; }
.ml-logo { font-weight: 900; font-size: 17px; color: #00cd3c; letter-spacing: -.3px; }
.ml-body { background: #fff; }
.ml-pl { display: flex; gap: 13px; align-items: center; padding: 13px 18px; cursor: pointer; }
.ml-pl:active { background: #fafafa; }
.ml-cover { width: 54px; height: 54px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.ml-pl-meta { flex: 1; min-width: 0; }
.ml-pl-title { font-size: 13.5px; font-weight: 700; color: #1a1a1a; }
.ml-pl-sub { font-size: 11px; color: #999; margin-top: 3px; }
.ml-collab { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; color: #00a83c; background: #e8f9ec; border-radius: 999px; padding: 2px 8px; margin-left: 6px; vertical-align: 1px; }
.ml-song { display: flex; align-items: center; gap: 12px; padding: 11px 18px; cursor: pointer; }
.ml-song:active { background: #fafafa; }
.ml-rank { width: 20px; font-size: 13px; font-weight: 800; color: #00cd3c; flex-shrink: 0; text-align: center; }
.ml-song-meta { flex: 1; min-width: 0; }

async function enterChar(id) {

  renderLock();
}
// 拉後端 runtime：把日程 phone_update 併進免費層、鎖屏推送、紅點、已解鎖付費 App
async function syncRuntime(id) {
  const rid = REAL_ID[id];
  if (!S.online || !rid) return;
  try {
    // 先把最新日程併進 dossier（免費層），再拉 runtime
    await fetch('/api/phone_check/apply_schedule/' + rid, { method: 'POST' }).catch(() => {});
    const rt = await fetch('/api/phone_check/runtime/' + rid).then(x => x.ok ? x.json() : null);
    if (!rt) return;
    // 進入偷看 session（重置風險/被抓/輪數）
    fetch('/api/phone_check/enter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ char_id: rid, session_id: '' }),
    }).catch(() => {});
    const c = CHARS.find(x => x.id === id);
    if (!c) return;
    // 已生成的付費 App 標記為 ready（開啟時不必再等生成）
    const ready = S.paidReady[id] || (S.paidReady[id] = new Set());
    (rt.paid_apps || []).forEach(k => ready.add(k));
    // 重新拉一次內容（apply_schedule 可能改了 talk/footprints/feed）
    await refreshCharContent(id);
    const sc = CHARS.find(x => x.id === id); if (sc) S.char = sc;
    const snap = rt.schedule || {};
    if (snap.lock_time) S.char.time = snap.lock_time;
    if (snap.date_label) S.char.date = snap.date_label;
    // 鎖屏推送：日程推送優先，接到 lockNotis
    if (Array.isArray(snap.notifications) && snap.notifications.length) {
      S.char.lockNotis = snap.notifications.map(n => ({
        icon: n.icon || '🔔', app: n.app || '手机', time: n.time || '刚刚', text: n.text || '',
      }));
    }
    // 紅點：把 schedule.app_badges 疊加到對應 App 的 badge
    const badges = snap.app_badges || {};
    (S.char.apps || []).forEach(a => {
      if (badges[a.id]) a.badge = (a.badge || 0) + badges[a.id];
    });
  } catch (e) { /* 靜默降級 */ }
}
async function refreshCharContent(id) {
  try {
    const data = await fetch('/api/phone_check/content').then(x => x.ok ? x.json() : null);
    if (!data || !Array.isArray(data.chars)) return;
    const rc = data.chars.find(x => x.demo_id === id);
    if (rc && rc.content && rc.content.apps) {
      const nc = buildCharFromContent(rc, CHARS.find(x => x.id === id));
      const idx = CHARS.findIndex(x => x.id === id);
      if (idx >= 0) CHARS[idx] = nc;
    }
  } catch (e) {}
}

function showRiskCountdown() {

  S.riskModal = true;
  openModal(`

function maybeTriggerRisk() {

/* ═══ RENDER APP (dispatcher) ═══ */
function renderApp() {
  _renderAppBody();

  host.insertAdjacentHTML('beforeend',
    `<button class="app-exit-fab" onclick="exitPhone()">✕ ${tx(UI.exitPhone)}</button>`);
}
function _renderAppBody() {
  const a = appState.app, c = S.char, v = $('view-app');
  flatItems = [];
  if (a.type === 'chat' && appState.room) return renderChatRoom(v, c, a);
  if (a.type === 'chat') return renderChatList(v, c, a);
  if (a.type === 'voice') return renderVoice(v, c, a);
  if (a.type === 'gallery') return renderGallery(v, c, a);
  if (a.type === 'screentime') return renderScreentime(v, c, a);
  if (a.type === 'search') return renderSearch(v, c, a);
  if (a.type === 'sns') return renderSns(v, c, a);
  if (a.type === 'market') return renderMarket(v, c, a);
  if (a.type === 'health') return renderHealth(v, c, a);
  if (a.type === 'folder') return renderFolder(v, c, a);
  if (a.type === 'footprints') return renderFootprints(v, c, a);
  if (a.type === 'feed') return renderFeed(v, c, a);
  if (a.type === 'music') return renderMusic(v, c, a);
  if (a.type === 'fortune') return renderFortune(v, c, a);
  // 擬真渲染器:mock 用新結構;後端生成內容仍是 secs 格式 → 回退通用列表
  if (a.type === 'purchase') return a.secs ? renderList(v, c, a) : renderPurchase(v, c, a);
  if (a.type === 'delivery') return a.secs ? renderList(v, c, a) : renderDelivery(v, c, a);
  if (a.type === 'taxi') return a.secs ? renderList(v, c, a) : renderTaxi(v, c, a);
  if (a.type === 'calls') return a.secs ? renderList(v, c, a) : renderCalls(v, c, a);
  if (a.type === 'ledger') return a.secs ? renderList(v, c, a) : renderLedger(v, c, a);
  if (a.type === 'list') return renderList(v, c, a);
}

/* ── chat ── */
const CHAT_FOLDERS = [
  { id: 'all', label: T('전체', '全部') },
  { id: 'unread', label: T('안읽음', '未讀') },
  { id: 'favorite', label: T('자주 찾는', '常用') },
  { id: 'archive', label: T('조용한 방', '靜音') },
];

function isArchivedRoom(room) {
  return Boolean(room && room.archived);
}

function chatFolderRooms(rooms, folder) {
  const activeRooms = rooms.filter(r => !isArchivedRoom(r));
  if (folder === 'unread') return activeRooms.filter(r => Number(r.unread || 0) > 0);
  if (folder === 'favorite') return activeRooms.filter(r => r.pinned || r.isUser);
  if (folder === 'archive') return rooms.filter(isArchivedRoom);
  return activeRooms;
}

function chatFolderCount(rooms, folder) {
  if (folder === 'unread') return chatFolderRooms(rooms, folder).reduce((n, r) => n + Number(r.unread || 0), 0);
  return chatFolderRooms(rooms, folder).length;
}

function setChatFolder(folder) {
  appState.chatFolder = folder;
  renderApp();
}

/* 멀티프로필: 기본은 대표 프로필, 부프로필(뒷계정 느낌)로 전환하면 방 목록/상단이 바뀐다 */
function chatProfiles(a) {
  if (Array.isArray(a.profiles) && a.profiles.length) return a.profiles;
  return [{ id: 'main', name: (LANG==='ko'?'대표 프로필':'代表檔案'), av: (a.face || '🙂') }];
}
function currentProfile(a) {
  const ps = chatProfiles(a);
  return ps.find(p => p.id === appState.chatProfile) || ps[0];
}
function setChatProfile(id) { appState.chatProfile = id; appState.room = null; closeModal(); renderApp(); }
function profileRooms(a) {
  const p = currentProfile(a);
  const all = a.rooms || [];
  // 방에 profile 필드가 있으면 그 프로필에만; 없으면 대표 프로필에 귀속
  return all.filter(r => (r.profile || 'main') === p.id);
}
function openProfileSwitcher() {
  const a = appState.app, ps = chatProfiles(a), cur = currentProfile(a);
  openModal(`
    <div class="acc-sheet-title">${LANG==='ko'?'프로필 전환':'切換檔案'}</div>
    ${ps.map(p => {
      const unread = (a.rooms||[]).filter(r => (r.profile||'main')===p.id).reduce((n,r)=>n+Number(r.unread||0),0);
      const isCur = p.id === cur.id;
      return `<div class="mp-row" onclick="setChatProfile('${p.id}')">
        <span class="mp-r-av" style="${p.cover?`background-image:url('${p.cover}')`:''}">${p.cover?'':(p.av||'🙂')}</span>
        <div class="mp-r-meta">
          <div class="mp-r-name">${p.secret?'🔒 ':''}${tx(p.name)}${p.secret?`<span class="mp-tag-secret">${LANG==='ko'?'비밀':'隱藏'}</span>`:''}</div>
          <div class="mp-r-status">${tx(p.status||'')}${unread?` · ${LANG==='ko'?'안읽음':'未讀'} ${unread}`:''}</div>
        </div>
        ${isCur ? '<span class="mp-r-check">✓</span>' : (unread?'<span class="mp-dot"></span>':'')}
      </div>`;
    }).join('')}
    <button class="m-sub-cta" onclick="closeModal()">${tx(UI.later)}</button>`);
}

function toggleChatSearch() {
  appState.chatSearchOpen = !appState.chatSearchOpen;
  if (!appState.chatSearchOpen) appState.chatQuery = '';
  renderApp();
  if (appState.chatSearchOpen) { const el = $('chatSearchInput'); if (el) el.focus(); }
}
function onChatSearch(val) {
  appState.chatQuery = val;
  const host = $('chatResults');
  if (host) host.innerHTML = chatResultsHTML(appState.app);
}
function clearChatSearch() { appState.chatQuery = ''; renderApp(); const el=$('chatSearchInput'); if(el) el.focus(); }
function escHtml(s) { return String(s).replace(/[&<>]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch])); }
function hl(text, q) {
  const s = escHtml(tx(text) || '');
  if (!q) return s;
  const idx = s.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return s;
  return s.slice(0, idx) + `<span class="chat-hl">` + s.slice(idx, idx+q.length) + `</span>` + s.slice(idx+q.length);
}
function roomMatches(r, q) {
  const ql = q.toLowerCase();
  if ((tx(r.name)||'').toLowerCase().includes(ql)) return { name:true };
  const hitMsg = (r.msgs||[]).find(m => !m.sys && (tx(m.t)||'').toLowerCase().includes(ql));
  if (hitMsg) return { msg: hitMsg };
  if ((tx(r.last)||'').toLowerCase().includes(ql)) return { last:true };
  return null;
}
function chatResultsHTML(a) {
  const rooms = a.rooms || [];
  const q = (appState.chatQuery || '').trim();
  if (!q) return `<div class="chat-search-hint">${LANG==='ko'?'이름 · 대화 내용으로 검색':'可搜尋名稱 · 對話內容'}</div>`;
  const hits = rooms.map(r => ({ r, m: roomMatches(r, q) })).filter(x => x.m);
  if (!hits.length) return `<div class="chat-empty">${LANG==='ko'?`'${escHtml(q)}' 검색 결과가 없어요.`:`找不到「${escHtml(q)}」的結果。`}</div>`;
  return `<div class="chat-search-hint">${LANG==='ko'?`결과 <b>${hits.length}</b>건`:`共 <b>${hits.length}</b> 個結果`}</div>` + hits.map(({r,m}) => {
    const i = rooms.indexOf(r);
    const face = r.face || (r.isUser ? '🧣' : '🙂');
    const preview = m.msg ? hl(m.msg.t, q) : (m.name ? hl(r.last || (r.msgs&&r.msgs.length?r.msgs[r.msgs.length-1].t:''), '') : hl(r.last, q));
    return `<div class="chat-list-item" onclick="openRoom(${i})">
      <div class="chat-face">${face}</div>
      <div class="chat-meta">
        <div class="chat-name">${hl(r.name, m.name?q:'')}${r.isUser ? `<span class="youtag">ME</span>` : ''}${r.muted ? '<span class="mutedic">🔇</span>' : ''}${r.archived ? '<span class="archiveic">🗄</span>' : ''}</div>
        <div class="chat-last">${preview}</div>
      </div>
      <div class="chat-right"><span class="chat-time">${tx(r.time)}</span>${r.unread ? `<span class="chat-unread">${r.unread}</span>` : ''}</div>
    </div>`;
  }).join('');
}

          const last = tx(r.last || (r.msgs && r.msgs.length ? (r.msgs[r.msgs.length-1].t) : ''));
          const face = r.face || (r.isUser ? '🧣' : '🙂');
          return `<div class="chat-list-item" onclick="openRoom(${i})">

            <div class="chat-name">${tx(r.name)}${r.isUser ? `<span class="youtag">ME</span>` : ''}${r.pinned ? '<span class="pinic">📌</span>' : ''}${r.muted ? '<span class="mutedic">🔇</span>' : ''}${r.archived ? '<span class="archiveic">🗄</span>' : ''}</div>
            <div class="chat-last">${last}</div>

}

/* ── voice (metadata-first + waveform preview + pay-to-listen) ── */
const WAVE = {
  calm:  i => 4 + (Math.sin(i*0.6)+1)*6,
  mid:   i => 4 + Math.abs(Math.sin(i*0.9))*16,
  burst: i => (i>13&&i<21) ? 8+Math.random()*20 : 4+Math.random()*4,
};
function waveBars(kind) {
  const fn = WAVE[kind] || WAVE.mid;
  return Array.from({length:34}, (_,i) => `<i style="height:${fn(i)}px"></i>`).join('');
}
function renderVoice(v, c, a) {
  v.innerHTML = statusbar(c.time, c.batt) + appHeader(a)
    + `<div class="app-body">

            <span class="vm-len">${m.len}</span></div>

      }).join('')}

}

/* ── search (Naver: 검색 + 브라우징 기록, 실제 검색 가능) ── */
function nvSetTab(t) { appState.nvTab = t; appState.nvSubmitted = ''; renderApp(); }
function nvOnInput(val) {
  appState.nvQuery = val;
  const host = $('nvBody');
  if (host) host.innerHTML = nvBodyHTML(appState.app);
  const x = $('nvClear'); if (x) x.style.display = val ? 'block' : 'none';
}
function nvClear() { appState.nvQuery = ''; appState.nvSubmitted = ''; renderApp(); const el=$('nvInput'); if(el) el.focus(); }
function nvSubmit(term) {
  const q = (term != null ? term : appState.nvQuery || '').trim();
  if (!q) return;
  appState.nvQuery = q; appState.nvSubmitted = q; appState.nvTab = 'history';
  renderApp();
}
function nvKey(e) { if (e.key === 'Enter') nvSubmit(); }
function nvResultCard(q, a) {
  // 命中既有搜尋記錄 → 展示對應詳情;否則給一個擬真「搜尋結果」占位
  const items = a.items || [];
  const hit = items.find(it => (tx(it.t)||'').toLowerCase().includes(q.toLowerCase()) || q.toLowerCase().includes((tx(it.t)||'').toLowerCase()));
  if (hit && hit.d) {
    return `<div class="nv-result">
      <div class="nv-result-tag">${LANG==='ko'?'통합검색':'綜合搜尋'} · "${escHtml(q)}"</div>
      <div class="nv-result-hit">🔎 ${LANG==='ko'?'이 검색은 그의 기록에 있었다':'這個搜尋,他查過'}</div>
      <div class="nv-result-d">${tx(hit.d)}</div>
    </div>`;
  }
  return `<div class="nv-result">
    <div class="nv-result-tag">${LANG==='ko'?'통합검색':'綜合搜尋'} · "${escHtml(q)}"</div>
    <div class="nv-result-empty">${LANG==='ko'?'그의 기록에 없는 검색어다. — 지금 네가 대신 검색하고 있다.':'這不是他查過的詞——現在是你替他在搜。'}</div>
  </div>`;
}
function nvBodyHTML(a) {
  const items = a.items || [];
  const browse = a.browse || [];
  const tab = appState.nvTab || 'history';
  const q = (appState.nvQuery || '').trim();
  const submitted = appState.nvSubmitted;
  // 输入了但未提交 → 联想(过滤历史);提交了 → 结果卡 + 相关历史
  if (q) {
    const matches = items.filter(it => (tx(it.t)||'').toLowerCase().includes(q.toLowerCase()));
    return (submitted ? nvResultCard(submitted, a) : '')
      + `<div class="sec-label">${submitted ? (LANG==='ko'?'관련 검색 기록':'相關搜尋記錄') : (LANG==='ko'?'자동완성':'搜尋建議')}</div>`
      + (matches.length ? matches.map(it => { const i = flatItems.push(it) - 1; return nvHistRow(it, i, q); }).join('')
          : `<div class="nv-sugg" onclick="nvSubmit('${escHtml(q).replace(/'/g,"\\'")}')"><span class="nv-hi">🔍</span><span>${escHtml(q)}</span><span class="nv-sugg-go">${LANG==='ko'?'검색':'搜尋'}</span></div>`);
  }
  if (tab === 'browse') {
    return `<div class="nv-note">${LANG==='ko'?'그가 연 페이지들 — 검색보다 정직한 행동 기록.':'他點開過的頁面——比搜尋更誠實的行為記錄。'}</div>`
      + browse.map(b => { const i = flatItems.push(b) - 1; return `
        <div class="nv-browse ${b.hot?'hotrow':''}" onclick="rowTap(this,${i})">
          <span class="nv-fav" style="background:${b.grad||'#eef2f4'}">${b.emo||'🌐'}</span>
          <div class="nv-hmeta"><div class="nv-ht">${tx(b.t)}</div><div class="nv-hs">${tx(b.site||'')}${b.visits?` · ${tx(b.visits)}`:''}</div></div>
          <span class="nv-htime">${tx(b.time||'')}</span>
          ${b.d?`<div class="row-detail" style="flex-basis:100%">${tx(b.d)}</div>`:''}
        </div>`; }).join('')
      + (browse.length ? '' : `<div class="chat-empty">${LANG==='ko'?'방문 기록이 없어요.':'沒有瀏覽記錄。'}</div>`);
  }
  return `<div class="nv-chips">${items.slice(0,6).map(it=>`<span class="nv-chip" onclick="nvSubmit('${(tx(it.t)||'').replace(/'/g,"\\'")}')">${tx(it.t)}</span>`).join('')}</div>

        <div class="fp-sub">${LANG==='ko'?'2차 비밀번호':'二級密碼'} · ${tx(f.passHint||T('가장 깊은 곳','最深的地方'))}</div>
        <div class="fp-dots">${[0,1,2,3].map(k=>`<div class="fp-dot ${k<folderPin.length?'on':''}"></div>`).join('')}</div>
        <div class="fd-keypad">

          <button class="fd-key" style="visibility:hidden"></button>

          <button class="fd-key" onclick="fdDel(${i})">⌫</button>

function fdKey(n, i) {
  const c = S.char, a = appState.app, f = a.folders[i], key = c.id + ':' + a.id + ':inner';
  if (folderPin.length >= 4) return;
  folderPin += n; renderApp();

      setTimeout(() => { appState.folderView = 'docs'; renderApp(); }, 200);

}

/* ── calls(Samsung 전화:本月排行 + 最近記錄) ── */
function callCount(s) {
  // 從 dur 字串（'12회 · 58분' / '12次 · 58分'）粗略抓通話次數;抓不到就看 pct
  const m = String(tx(s.dur) || '').match(/(\d+)\s*(회|次)/);
  if (m) return Number(m[1]);
  return Number(s.pct) > 0 ? 1 : 0;
}
const CALL_LABELS = { in:T('수신','接聽'), out:T('발신','撥出'), miss:T('부재중','未接'), cancel:T('발신 취소','撥出取消') };
function renderCalls(v, c, a) {
  const dirIc = { in: '↙', out: '↗', miss: '✕', cancel: '⤴' };

  const ranked = stats.filter(s => callCount(s) > 0);

  const maxPct = Math.max(1, ...ranked.map(s => Number(s.pct) || 0));

    + `<div class="app-body">

          </div>`; }).join('')}

  delivery:   { bg:'#2AC1BC', fg:`<span class="ic-baemin">배민</span>` },
  taxi:       { bg:'#FEE500', fg:`<span class="ic-kakaot">T</span>` },
  screen:     { bg:'linear-gradient(160deg,#4c4c56,#2a2a30)', fg:`<span class="ic-emoji">⏳</span>` },
  calls:      { bg:'linear-gradient(160deg,#3ad35b,#26b345)', fg:`<span class="ic-phone">📞</span>` },
  music:      { bg:'#00CD3C', fg:`<span class="ic-emoji" style="font-size:26px">🎵</span>` },
  fortune:    { bg:'linear-gradient(160deg,#4a3874,#241c38)', fg:`<span class="ic-emoji" style="font-size:26px">🔮</span>` },
};
function appIcon(a) {
  const ic = ICON[a.id] || { bg: a.bg || '#e6e4e0', fg: `<span class="ic-emoji">${a.icon||'📱'}</span>` };
  return `<span class="glyph" style="background:${ic.bg}">${ic.fg}</span>`;
}

const GENRE_BY_ID = {
  yuwi:  { genre: T('힐링 · 편의점 그 사람','治癒 · 便利店的他'), stagePct: 34, hook: T('새벽 편의점 음향 디자이너','深夜便利店的音效師') },
  shen:  { genre: T('서스펜스 · 위험한 이웃','懸疑 · 危險鄰居'), stagePct: 58, hook: T('상냥한 옆집 사진작가','溫柔的隔壁攝影師') },
  haesu: { genre: T('일상 · 무뚝뚝 약사의 반전','日常 · 高冷藥師反差'), stagePct: 21, hook: T('반나절 뒤 "ㅇㅇ" 한 글자','半天後一個「嗯」') },
};

function badgeCount(type, node) {
  // 給 App 圖示一個「有幾條新東西」的紅點：粗略數 unread / hot 條目
  try {
    if (type === 'chat') return (node.rooms||[]).reduce((n,r)=>n+(r.unread||0),0);
    if (type === 'voice') return (node.memos||[]).filter(m=>m.hot).length;
    if (type === 'gallery') { const ph=node.photos||{}; return (ph.deleted||[]).length; }
  } catch(e){}
  return 0;
}

function normalizePassChanged(node) {
  if (!node || !node.pass) return null;
  return {
    pass: String(node.pass),
    lockMsg: node.lock_msg ?? node.lockMsg ?? '',
    hint: node.hint || '',
    reveal: node.reveal || '',
  };
}

// 把後端生成的一個角色內容，組裝成前端 CHARS 需要的物件（zh 純字串 → 用作雙語物件的兜底）
function buildCharFromContent(rc, fallback) {
  const gc = rc.content || {};
  const meta = gc.meta || {};
  const g = GENRE_BY_ID[rc.demo_id] || {};
  const fallbackApps = (fallback && fallback.apps) || [];
  const apps = APP_META.map(([id,type,icon,name,bg]) => {
    const node = (gc.apps || {})[id] || fallbackApps.find(a => a.id === id);
    if (!node) return null;                 // 該功能沒生成且沒有 mock 則不顯示
    return Object.assign({ id, type, icon, name, bg,
      badge: badgeCount(type, node) }, node);
  }).filter(Boolean);
  return {
    id: rc.demo_id,
    name: rc.name || rc.demo_id,
    cover: rc.cover_url || '',
    genre: g.genre || '',
    hook: meta.hook_line || g.hook || '',
    stagePct: Number.isFinite(Number(meta.stage_pct)) ? Number(meta.stage_pct) : (g.stagePct || (fallback && fallback.stagePct) || 30),
    stageLabel: meta.stage_label || '',
    time: meta.time || '23:00', date: meta.date_label || '',
    batt: meta.batt || 60,
    lockMsg: meta.lock_msg || '',
    pass: String(meta.pass || '0000'),
    passOrigin: meta.pass_origin || '',
    hint: meta.hint || '',
    passChanged: normalizePassChanged(meta.pass_changed || (fallback && fallback.passChanged)),
    peekArc: meta.peek_arc || (fallback && fallback.peekArc) || null,
    clues: (gc.clues || []).map(c => ({ id: c.id, icon: c.icon, text: c.text })),
    truth: gc.truth ? {
      emoji: gc.truth.emoji || '🔓', title: gc.truth.title || '',
      body: gc.truth.body || '', next: gc.truth.next || '',
      nextIn: gc.truth.next_in || '',
    } : null,
    apps,
    _generated: true,
  };
}

function applyContent(data) {
  if (!data || !Array.isArray(data.chars) || !data.chars.length) return false;
  const built = data.chars.filter(rc => rc && rc.content && rc.content.apps)
                          .map(rc => buildCharFromContent(rc, CHARS.find(c => c.id === rc.demo_id)));
  if (!built.length) return false;
  // 用生成的角色替換 mock：保持 CHARS 引用（供閉包），逐一 splice/替換
  built.forEach(nc => {
    const idx = CHARS.findIndex(c => c.id === nc.id);
    if (idx >= 0) CHARS[idx] = nc; else CHARS.push(nc);
  });
  return true;
}
function loadContent() {
  // 被後端服務時拉 LLM 生成內容；file:// 直開或未生成 → 靜默保留 mock
  fetch('/api/phone_check/tiers')
    .then(r => r.ok ? r.json() : null)
    .then(t => {
      if (t && Array.isArray(t.paid_lock)) { S.online = true; PAID_LOCK = t.paid_lock; }
    })
    .catch(() => {})
    .finally(() => {
      fetch('/api/phone_check/content')
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (applyContent(data)) render(); })
        .catch(() => {})
        .finally(() => { maybeDeepLink(); });
    });
}
// 從聊天頁「查手機」跳來時帶 ?char=<real_id>：直接進入該角色的鎖屏，而非停在選人 hub
function maybeDeepLink() {
  const params = new URLSearchParams(location.search);
  const rid = params.get('char');
  if (!rid) return;
  const demoId = Object.keys(REAL_ID).find(k => REAL_ID[k] === rid);
  const c = demoId && CHARS.find(x => x.id === demoId);
  if (c) enterChar(c.id);   // 進入 TA 的鎖屏頁
}

/* ═══ INIT ═══ */
function render() {
  if (S.screen === 'hub') renderHub();
  else if (S.screen === 'lock') renderLock();
  else if (S.screen === 'home') renderHome();
  else if (S.screen === 'app') renderApp();
}
$('modalWrap').addEventListener('click', e => { if (e.target === $('modalWrap')) closeModal(); });
renderHub();
loadContent();
</script>
</body>
