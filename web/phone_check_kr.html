<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>查手機 · Phone Peek</title>
<style>
:root {
  --bg: #eceae6; --paper: #f7f6f3; --card: #ffffff; --line: #e9e6e0;
  --ink: #201f1d; --sub: #8f8b83; --faint: #b8b4ac;
  --accent: #6f6a63; --sage: #a7b0a2; --clay: #c9a99a; --gold: #c9a24a;
  --hot: #d8746a; --ok: #93a98f;
  --sh: 0 10px 40px rgba(60,54,46,.10);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; font-family: "Pretendard", -apple-system, "Apple SD Gothic Neo", "PingFang TC", system-ui, sans-serif;
  background: linear-gradient(180deg, #e8e5df 0%, #ded9d1 100%); color: var(--ink); min-height: 100vh;
  -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
.stage { display: flex; flex-direction: column; align-items: center; padding: 26px 12px 60px; }
.demo-bar { width: min(410px, 100%); display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.demo-bar .title { font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: .05em; }
.demo-bar .spacer { flex: 1; }
.lang-switch { display: inline-flex; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 2px; box-shadow: var(--sh); }
.lang-btn { border-radius: 999px; padding: 5px 13px; font-size: 12px; color: var(--sub); font-weight: 600; }
.lang-btn.active { background: var(--ink); color: #fff; }

/* Samsung One UI 機身:等寬窄邊框、居中打孔前鏡頭、底部手勢條 */
.phone { width: min(400px, 100vw - 16px); height: 812px; max-height: calc(100vh - 40px); min-height: 640px;
  border-radius: 34px; background: #000; border: 8px solid #141417;
  box-shadow: 0 40px 90px rgba(70,62,52,.30), 0 0 0 2px #adaba7, 0 0 0 3px rgba(255,255,255,.55);
  position: relative; overflow: hidden; display: flex; flex-direction: column; }
.punch { position: absolute; top: 13px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #060608; border-radius: 50%; z-index: 60;
  box-shadow: inset 0 0 2px 1px rgba(90,105,130,.55), 0 0 0 2px rgba(0,0,0,.3); }
.gesture-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 108px; height: 4px; border-radius: 2px; background: rgba(20,20,20,.26); z-index: 70; pointer-events: none; }
.screen { flex: 1; position: relative; overflow: hidden; border-radius: 26px; background: var(--paper); }
.view { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.view.show { display: flex; }
.statusbar { height: 50px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 5px; font-size: 15px; font-weight: 600; z-index: 50; letter-spacing: -0.02em; }
.statusbar .sb-time { font-variant-numeric: tabular-nums; }
.statusbar .sb-right { display: flex; align-items: center; gap: 6px; }
.statusbar .sb-ic { fill: currentColor; display: block; }
.statusbar .sb-batt { display: flex; align-items: center; gap: 1px; }
.sb-batt-shell { position: relative; width: 24px; height: 12px; border: 1px solid rgba(128,128,128,.45); border-radius: 3px; padding: 1px; box-sizing: border-box; }
.sb-batt-fill { display: block; height: 100%; border-radius: 1.5px; background: currentColor; }
.sb-batt-fill.low { background: #f5473d; }
.sb-batt-cap { width: 1.5px; height: 4px; border-radius: 0 1px 1px 0; background: rgba(128,128,128,.45); }
@media (max-height: 760px) { .phone { height: calc(100vh - 30px); } }
.hub { background: var(--paper); }
.hub-body { flex: 1; overflow: auto; padding: 6px 22px 34px; }
.hub-head { padding: 20px 2px 8px; }
.hub-eyebrow { font-size: 10.5px; letter-spacing: .32em; color: var(--faint); font-weight: 700; text-transform: uppercase; }
.hub-title { font-size: 25px; font-weight: 800; margin: 12px 0 8px; line-height: 1.35; letter-spacing: -0.02em; }
.hub-sub { font-size: 12.5px; color: var(--sub); line-height: 1.7; }
.ticket-pill { display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--line); color: var(--accent); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; margin-top: 18px; box-shadow: var(--sh); }
.ticket-pill b { color: var(--gold); }
.hub-card { margin-top: 16px; border-radius: 26px; overflow: hidden; position: relative; background: var(--card); cursor: pointer; transition: transform .2s, box-shadow .2s; box-shadow: var(--sh); border: 1px solid var(--line); }
.hub-card:hover { transform: translateY(-3px); box-shadow: 0 18px 50px rgba(60,54,46,.16); }
.hub-card .cardbg { height: 168px; background-size: cover; background-position: center 22%; position: relative; }
.hub-card .genre { position: absolute; top: 14px; left: 14px; font-size: 10.5px; font-weight: 700; letter-spacing: .04em; padding: 5px 11px; border-radius: 999px; background: rgba(255,255,255,.82); backdrop-filter: blur(8px); color: var(--ink); }
.hub-card .newdot { position: absolute; top: 14px; right: 14px; font-size: 10px; font-weight: 700; color: #fff; background: var(--clay); border-radius: 999px; padding: 4px 10px; }
.hub-card .cardmeta { padding: 15px 18px 17px; }
.hub-card .cname { font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
.hub-card .chook { font-size: 12px; color: var(--sub); margin-top: 5px; line-height: 1.6; }
.hub-card .cstage { display: flex; align-items: center; gap: 9px; margin-top: 13px; }
.stage-track { flex: 1; height: 3px; border-radius: 2px; background: #ece9e3; overflow: hidden; }
.stage-fill { height: 100%; border-radius: 2px; background: var(--clay); }
.stage-label { font-size: 10px; color: var(--faint); white-space: nowrap; font-weight: 600; }
.hub-card .card-pass { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; color: var(--sub); background: rgba(60,54,46,.05); border: 1px dashed var(--faint); border-radius: 10px; padding: 5px 11px; letter-spacing: .03em; }
.hub-card .card-pass b { color: var(--ink); font-weight: 800; font-size: 13px; letter-spacing: .12em; }
.hub-card .cardbg { cursor: pointer; }
.card-actions { display: flex; gap: 8px; margin-top: 13px; }
.card-act { flex: 1; padding: 9px 0; border-radius: 11px; border: 1px solid var(--line); background: rgba(60,54,46,.04); color: var(--ink); font-size: 12.5px; font-weight: 700; cursor: pointer; transition: transform .08s, background .15s; }
.card-act:active { transform: scale(.97); }
.card-act.primary { background: var(--ink); color: #fff; border-color: var(--ink); }

/* ── LIVE CHAT (KakaoTalk 風,真輸入框) ── */
.livechatview { background: #b2c7d9; }
.lc-nav { align-items: center; }
.lc-head { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; }
.lc-head-av { width: 30px; height: 30px; border-radius: 10px; background-size: cover; background-position: center; flex-shrink: 0; background-color: #d8d2c8; }
.lc-head-meta { display: flex; flex-direction: column; min-width: 0; line-height: 1.25; }
.lc-head-meta b { font-size: 14px; font-weight: 800; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.lc-head-meta i { font-size: 10.5px; color: var(--sub); font-style: normal; }
.lc-topeek { flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%; border: none; background: rgba(0,0,0,.06); font-size: 15px; cursor: pointer; }
.lc-topeek:active { background: rgba(0,0,0,.12); }
.lc-body { flex: 1; overflow-y: auto; padding: 14px 12px 8px; display: flex; flex-direction: column; gap: 9px; }
.lc-hint { margin: auto; color: #4a5a68; font-size: 12.5px; background: rgba(255,255,255,.55); border-radius: 12px; padding: 9px 15px; text-align: center; }
.lc-row { display: flex; align-items: flex-end; gap: 7px; max-width: 84%; }
.lc-row.mine { align-self: flex-end; flex-direction: row-reverse; }
.lc-face { width: 30px; height: 30px; border-radius: 12px; background-size: cover; background-position: center; flex-shrink: 0; background-color: #d8d2c8; }
.lc-bubble { padding: 9px 12px; border-radius: 4px 15px 15px 15px; background: #fff; color: #191919; font-size: 14px; line-height: 1.5; word-break: break-word; box-shadow: 0 1px 1px rgba(0,0,0,.06); }
.lc-bubble i { color: #7a6f66; font-size: 12.5px; }
.lc-row.mine .lc-bubble { background: #fae100; border-radius: 15px 4px 15px 15px; }
.lc-typing { align-self: flex-start; }
.lc-offline { text-align: center; font-size: 11.5px; color: #8a5a3a; background: #fdf1e6; padding: 7px 12px; }
.lc-peekcue { flex-shrink: 0; margin: 4px 11px 8px; display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 15px; background: linear-gradient(135deg,#2b2b32,#3d3a44); color: #fff; cursor: pointer; box-shadow: 0 6px 18px rgba(40,36,46,.28); animation: peekcue-in .5s cubic-bezier(.22,.8,.28,1); }
.lc-peekcue:active { transform: scale(.98); }
.lc-peekcue-ic { font-size: 20px; flex-shrink: 0; }
.lc-peekcue-tx { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.lc-peekcue-tx b { font-size: 13px; font-weight: 700; }
.lc-peekcue-tx span { font-size: 11px; opacity: .78; }
.lc-peekcue-go { font-size: 18px; opacity: .6; }
@keyframes peekcue-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.lc-input { display: flex; gap: 8px; padding: 9px 11px; background: #f7f6f3; border-top: 1px solid rgba(0,0,0,.07); flex-shrink: 0; }
.lc-input input { flex: 1; border: 1px solid var(--line); border-radius: 999px; padding: 10px 15px; font-size: 14px; background: #fff; color: var(--ink); outline: none; }
.lc-input input:focus { border-color: var(--accent); }
.lc-send { border: none; background: var(--ink); color: #fff; border-radius: 999px; padding: 0 17px; font-size: 13.5px; font-weight: 700; cursor: pointer; }
.lc-send:disabled { opacity: .4; cursor: default; }
.lockview { background-size: cover; background-position: center; }
.lockview::before { content: ""; position: absolute; inset: 0; backdrop-filter: blur(30px) brightness(1.08); background: rgba(247,246,243,.55); }
.lock-body { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; padding: 2px 24px 26px; overflow: hidden; }
.lock-top { display: flex; flex-direction: column; align-items: center; width: 100%; padding-top: 12px; }
.lock-auth { margin-top: auto; display: flex; flex-direction: column; align-items: center; width: 100%; }
.lock-time { font-size: 74px; font-weight: 200; letter-spacing: -0.03em; color: var(--ink); line-height: 1; }
.lock-date { font-size: 14px; color: var(--sub); margin-top: 6px; font-weight: 500; }
.lock-msg { font-size: 12px; color: var(--sub); text-align: center; line-height: 1.6; max-width: 260px; }
.lock-situation { margin: 14px auto 0; max-width: 280px; font-size: 13px; color: #2a2723; text-align: center; line-height: 1.7; font-style: italic; letter-spacing: .2px; font-weight: 600; text-shadow: 0 1px 6px rgba(255,255,255,.6); transition: opacity .3s ease; }
.lock-body.stage-auth .lock-situation { opacity: 0; pointer-events: none; }
.pin-dots { display: flex; gap: 20px; margin: 16px 0 18px; }
.pin-dot { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid var(--accent); transition: background .1s, transform .1s; }
.pin-dot.on { background: var(--accent); transform: scale(1.05); }
.pin-dots.err { animation: shake .35s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
.keypad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px 26px; }
.key { width: 72px; height: 62px; border-radius: 16px; background: transparent; border: none; color: var(--ink); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; transition: background .12s; }
.key:active { background: rgba(60,54,46,.09); }
.key-n { font-size: 30px; font-weight: 300; line-height: 1; }
.key-sub { font-size: 8.5px; font-weight: 700; letter-spacing: .12em; color: var(--faint); }
.key.key-fn { font-size: 15px; font-weight: 500; color: var(--accent); }
.key.ghostkey { background: transparent; }
.lock-back { position: absolute; top: 54px; left: 20px; font-size: 13px; color: var(--accent); z-index: 5; font-weight: 600; }

/* ── 兩段式鎖屏:靜息態(狀態+push)→ 點擊拉起鍵盤 ── */
.lock-body.stage-idle { cursor: pointer; }
.lock-body.stage-idle .lock-top { padding-top: 30px; transition: padding-top .42s cubic-bezier(.22,.8,.28,1); }
.lock-body.stage-idle .lock-time { transition: font-size .42s cubic-bezier(.22,.8,.28,1); }
.lock-body.stage-idle .lock-auth { opacity: 0; transform: translateY(30px); pointer-events: none; }
.lock-body.stage-idle .keypad, .lock-body.stage-idle .pin-dots, .lock-body.stage-idle .lock-msg { pointer-events: none; }
.lock-body.stage-auth .lock-top { padding-top: 6px; transition: padding-top .42s cubic-bezier(.22,.8,.28,1); }
.lock-body.stage-auth .lock-time { font-size: 52px; transition: font-size .42s cubic-bezier(.22,.8,.28,1); }
.lock-body.stage-auth .lock-auth { opacity: 1; transform: translateY(0); transition: opacity .34s ease .1s, transform .42s cubic-bezier(.22,.8,.28,1) .06s; }
.lock-body.stage-auth .lock-hint { opacity: 0; pointer-events: none; }
.lock-hint { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 12px; color: var(--sub); font-weight: 600; opacity: .85; transition: opacity .3s; pointer-events: none; }
.lock-swipe-ic { font-size: 17px; line-height: 1; animation: swipeUp 1.7s ease-in-out infinite; }
@keyframes swipeUp { 0%,100% { transform: translateY(3px); opacity: .5; } 50% { transform: translateY(-3px); opacity: 1; } }

.unlock-flash { position: absolute; inset: 0; z-index: 80; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px; background: rgba(247,246,243,.94); backdrop-filter: blur(12px); }
.unlock-flash.show { display: flex; animation: fadein .3s; }
.gen-spinner { width: 26px; height: 26px; margin: 14px auto 2px; border: 3px solid rgba(0,0,0,.12); border-top-color: var(--clay,#c07a5b); border-radius: 50%; animation: spin 0.8s linear infinite; }
.gen-wait { opacity: .8; }
@keyframes spin { to { transform: rotate(360deg); } }
.upd-btn { position: absolute; top: 10px; right: 12px; z-index: 60; font-size: 11px; padding: 5px 10px; border-radius: 999px; border: none; background: rgba(20,20,24,.7); color: #fff; cursor: pointer; }
.upd-btn:disabled { opacity: .5; }
.ask-pin-btn { margin: 10px auto 0; display: block; font-size: 12px; padding: 7px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,.4); background: rgba(255,255,255,.12); color: #fff; cursor: pointer; backdrop-filter: blur(6px); }
.store-list { display: flex; flex-direction: column; gap: 2px; }
.store-row { display: flex; align-items: center; gap: 13px; width: 100%; padding: 11px 16px; background: none; border: none; cursor: pointer; text-align: left; }
.store-row:active { background: rgba(0,0,0,.04); }
.store-row .glyph { width: 44px; height: 44px; border-radius: 12px; flex: none; }
.store-meta { flex: 1; min-width: 0; }
.store-meta b { display: block; font-size: 14px; color: var(--ink); }
.store-meta span { display: block; font-size: 11px; color: var(--faint); margin-top: 2px; }
.store-b { position: static; margin-left: auto; }
.store-go { font-size: 18px; color: var(--faint); }
.memo-body { background: #fdf6df; }
.memo-card { background: #fffdf5; margin: 10px 14px; padding: 13px 15px; border-radius: 12px; border: 1px solid #f0e6bf; box-shadow: 0 1px 3px rgba(120,100,40,.08); cursor: pointer; }
.memo-card.hot { border-color: #f2c94c; background: #fffbe8; }
.memo-head { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.memo-title { font-size: 14px; font-weight: 800; color: #4a4230; }
.memo-time { font-size: 10.5px; color: #b0a67e; white-space: nowrap; }
.memo-strike { margin-top: 7px; font-size: 12px; color: #b6ab86; }
.memo-strike s { text-decoration: line-through; text-decoration-color: #c9392b; }
.memo-text { margin-top: 6px; font-size: 13px; line-height: 1.65; color: #5a5240; white-space: pre-wrap; }
.memo-edited { margin-top: 8px; font-size: 10.5px; color: #b0a67e; }
.memo-card.open .row-detail { display: block; margin-top: 8px; }
/* calendar */
.cal-body { background: var(--paper); }
.cal-month { padding: 18px 20px 6px; font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -.02em; }
.cal-dday-row { display: flex; gap: 8px; padding: 4px 14px 8px; overflow-x: auto; }
.cal-dday { flex: 0 0 auto; background: var(--ink); color: #fff; border-radius: 14px; padding: 11px 15px; cursor: pointer; min-width: 96px; }
.cal-dday.hot { background: var(--hot); }
.cal-dday b { display: block; font-size: 17px; font-weight: 800; letter-spacing: .02em; }
.cal-dday span { font-size: 10.5px; opacity: .85; }
.cal-dday .row-detail { color: #fff; background: rgba(255,255,255,.14); }
.cal-ev { display: flex; gap: 12px; background: var(--card); margin: 0 14px 7px; border-radius: 14px; padding: 13px 15px; border: 1px solid var(--line); cursor: pointer; flex-wrap: wrap; }
.cal-ev.hot { border-color: #e6cabf; }
.cal-ev.secret { border-style: dashed; }
.cal-ev-date { font-size: 12px; font-weight: 800; color: var(--accent); width: 62px; flex-shrink: 0; }
.cal-rep { margin-left: 3px; font-size: 10px; }
.cal-ev-body { flex: 1; min-width: 0; }
.cal-ev-title { font-size: 13.5px; font-weight: 700; color: var(--ink); }
.cal-ev-meta { font-size: 11px; color: var(--sub); margin-top: 3px; }
.cal-ev.open .row-detail { display: block; }
.cal-ev .row-detail { flex-basis: 100%; }
/* mail */
.mail-tabs { display: flex; gap: 4px; padding: 8px 12px; background: var(--card); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.mail-tab { font-size: 12px; font-weight: 600; color: var(--sub); padding: 7px 13px; border-radius: 999px; }
.mail-tab.active { background: var(--ink); color: #fff; }
.mail-tab span { margin-left: 5px; font-size: 10px; opacity: .8; }
.mail-row { padding: 13px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
.mail-row.unread { background: #f3f7fe; }
.mail-row.hot .mail-subj { color: var(--hot); }
.mail-line1 { display: flex; justify-content: space-between; gap: 8px; }
.mail-from { font-size: 12.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mail-time { font-size: 10.5px; color: var(--faint); white-space: nowrap; }
.mail-subj { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 4px; }
.mail-row.unread .mail-subj::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #2f7df6; margin-right: 6px; vertical-align: 1px; }
.mail-prev { font-size: 11.5px; color: var(--sub); margin-top: 3px; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mail-row.open .row-detail { display: block; margin-top: 8px; }
/* stay */
.stay-note { margin: 12px 14px; padding: 11px 14px; background: #fdeef4; border: 1px solid #f6d3e2; border-radius: 14px; font-size: 11.5px; color: #a24d78; line-height: 1.6; }
.stay-card { background: var(--card); margin: 0 14px 8px; border-radius: 16px; padding: 14px 16px; border: 1px solid var(--line); cursor: pointer; }
.stay-card.hot { border-color: #f0c3d8; }
.stay-card.cancelled { opacity: .62; }
.stay-card.cancelled .stay-place { text-decoration: line-through; }
.stay-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.stay-place { font-size: 14px; font-weight: 800; color: var(--ink); }
.stay-status { font-size: 10.5px; color: var(--sub); white-space: nowrap; }
.stay-meta { font-size: 11.5px; color: var(--sub); margin-top: 5px; }
.stay-memo { font-size: 11.5px; color: #a24d78; background: #fdf2f7; border-radius: 8px; padding: 5px 9px; margin-top: 8px; display: inline-block; }
.stay-foot { display: flex; justify-content: space-between; align-items: baseline; margin-top: 9px; }
.stay-foot span { font-size: 10.5px; color: var(--faint); }
.stay-foot b { font-size: 14px; font-weight: 800; color: var(--ink); }
.stay-card.open .row-detail { display: block; margin-top: 9px; }
.ic-cal { color: #fa5252; font-weight: 800; }
.ic-cal b { font-size: 22px; }
.unlock-flash .big { font-size: 40px; }
.uf-check { margin-bottom: 4px; }
.uf-c { stroke-dasharray: 151; stroke-dashoffset: 151; animation: ufc .5s ease forwards; }
.uf-t { stroke-dasharray: 44; stroke-dashoffset: 44; animation: uft .35s ease .38s forwards; }
@keyframes ufc { to { stroke-dashoffset: 0; } }
@keyframes uft { to { stroke-dashoffset: 0; } }
.unlock-flash .t1 { font-size: 16px; font-weight: 700; }
.unlock-flash .t2 { font-size: 12px; color: var(--sub); }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.homeview { background-size: cover; background-position: center; }

.home-exit-fab { position: absolute; right: 14px; bottom: 20px; z-index: 40; display: flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: #fff; background: rgba(20,18,28,.82); border: 1px solid rgba(255,255,255,.16); box-shadow: 0 6px 18px rgba(0,0,0,.28); padding: 10px 15px; border-radius: 999px; letter-spacing: -0.01em; }

.appgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px 10px; padding: 22px 6px; }
.appicon { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; transition: transform .1s; }
.appicon:active { transform: scale(.9); }
.appicon .glyph { width: 58px; height: 58px; border-radius: 17px; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 3px 9px rgba(60,54,46,.12); position: relative; background: #fff; overflow: hidden; }
.appicon .label { font-size: 11px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5); max-width: 78px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; letter-spacing: -0.01em; }
.appicon .badge { position: absolute; top: -5px; right: 6px; min-width: 18px; height: 18px; border-radius: 999px; background: #fa5252; color: #fff; font-size: 10.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; padding: 0 5px; z-index: 3; box-shadow: 0 0 0 2px rgba(255,255,255,.9); }
.appicon .lockcover { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 16px; background: rgba(30,27,24,.34); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; font-size: 15px; z-index: 2; }
/* brand glyphs */
.ic-emoji { font-size: 30px; line-height: 1; }
.ic-kko { color: #3A1D1D; font-weight: 900; font-size: 15px; font-style: italic; letter-spacing: -.5px; }
.ic-ig { width: 30px; height: 30px; border: 2.5px solid #fff; border-radius: 9px; position: relative; }

.ic-ig::after { content:""; position:absolute; top:5px; right:5px; width:3px; height:3px; background:#fff; border-radius:50%; }
.ic-naver { color:#fff; font-weight:900; font-size:30px; font-family:Arial,sans-serif; transform:skewX(-4deg); }
.ic-yt { width:30px; height:21px; background:#fff; border-radius:7px; position:relative; }
.ic-yt::after { content:""; position:absolute; top:50%; left:52%; transform:translate(-50%,-50%); border-left:9px solid #FF0000; border-top:6px solid transparent; border-bottom:6px solid transparent; }
.ic-daangn { color:#fff; font-weight:800; font-size:26px; }
.ic-toss { color:#fff; font-weight:800; font-size:15px; letter-spacing:-.5px; }
.ic-health { color:#fb3958; font-size:30px; line-height:1; }
.ic-baemin { color:#fff; font-weight:800; font-size:15px; }
.ic-kakaot { color:#3A1D1D; font-weight:900; font-size:28px; font-style:italic; }
.ic-photos { width:30px; height:30px; border-radius:50%; background:conic-gradient(from 0deg,#f9c846,#f36c60,#e14a94,#8a5cf6,#4c9ff0,#39c07a,#f9c846); position:relative; }

.ic-map { font-size:26px; }

.page-dots { display:flex; justify-content:center; gap:7px; padding:6px 0 2px; }
.page-dots i { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.4); }
.page-dots i.on { background:rgba(255,255,255,.95); }
.truth-card { margin-top: 14px; border-radius: 20px; padding: 16px; background: #fff; border: 1px solid var(--line); box-shadow: var(--sh); }

.appview { background: var(--paper); color: var(--ink); }

.app-exit-fab { position: absolute; right: 14px; bottom: 20px; z-index: 40; display: flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 700; color: #fff; background: rgba(20,18,28,.82); border: 1px solid rgba(255,255,255,.16); box-shadow: 0 6px 18px rgba(0,0,0,.28); padding: 10px 15px; border-radius: 999px; letter-spacing: -0.01em; }

.ams-box { width: 100%; background: var(--card,#fff); border-radius: 20px 20px 0 0; padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); box-shadow: 0 -8px 28px rgba(0,0,0,.2); animation: amsUp .22s ease; }

.pw-auto { width: 100%; margin-top: 12px; display: flex; align-items: center; gap: 10px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 14px; background: #faf8f4; cursor: pointer; }

.app-exit-fab:active { background: rgba(20,18,28,.95); }
.app-nav .subtag { margin-left: auto; font-size: 10.5px; color: var(--faint); }

.app-body { flex: 1; overflow: auto; padding-bottom: 88px; }
.sec-label { padding: 18px 20px 8px; font-size: 12px; font-weight: 700; color: var(--sub); letter-spacing: -0.01em; }

.me-tag { font-size: 10px; color: #6b5bd2; font-weight: 700; }
.kko-list { background: #fff; }
.talkroom { background: #b2c7d9; flex: 1; overflow: auto; padding: 8px 12px 16px; }
.kko-date { text-align: center; margin: 8px auto 12px; font-size: 11px; color: #fff; background: rgba(0,0,0,.16); border-radius: 999px; padding: 4px 14px; width: fit-content; }
.kko-note { text-align: center; margin: 0 auto 12px; font-size: 10.5px; color: #4a5560; background: rgba(255,255,255,.55); border-radius: 8px; padding: 5px 12px; width: fit-content; max-width: 90%; line-height: 1.5; }

.bubble-row { display: flex; margin-bottom: 9px; gap: 7px; align-items: flex-start; }

._fresh, [class*="feed-card"]._fresh { position: relative; }

/* 歷史集合頁 */

/* footprints / map */
.map-wrap { margin: 12px 14px; border-radius: 20px; overflow: hidden; border: 1px solid var(--line); background: #e9ece8; position: relative; height: 190px; }
.map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(120,130,120,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(120,130,120,.1) 1px, transparent 1px); background-size: 26px 26px; }
/* 地圖裝飾層：道路/河流/綠地，提升「像地圖」的質感（純 CSS） */
.map-road { position: absolute; background: #fff; box-shadow: 0 0 0 1px rgba(120,130,120,.14); }
.map-road.h { left: -4px; right: -4px; height: 9px; border-radius: 2px; }
.map-road.v { top: -4px; bottom: -4px; width: 9px; border-radius: 2px; }
.map-river { position: absolute; top: -30px; bottom: -30px; width: 30px; background: #d3e2e5; transform: rotate(16deg); opacity: .85; }
.map-park { position: absolute; border-radius: 10px; background: #dde7d4; opacity: .9; }
.map-blocks { position: absolute; border-radius: 4px; background: rgba(255,255,255,.45); border: 1px solid rgba(120,130,120,.12); }
.map-pin { position: absolute; transform: translate(-50%,-100%); font-size: 22px; cursor: pointer; }
.map-pin .pin-lbl { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-size: 8.5px; font-weight: 700; background: rgba(255,255,255,.9); border-radius: 6px; padding: 1px 6px; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
.map-pin.hot { animation: pinpulse 1.6s infinite; }
@keyframes pinpulse { 0%,100% { transform: translate(-50%,-100%) scale(1); } 50% { transform: translate(-50%,-100%) scale(1.2); } }
.trip-item { background: var(--card); margin: 0 14px 8px; border-radius: 16px; padding: 13px 15px; border: 1px solid var(--line); cursor: pointer; }
.trip-top { display: flex; align-items: baseline; gap: 8px; }
.trip-route { font-size: 13px; font-weight: 700; flex: 1; }
.trip-time { font-size: 10.5px; color: var(--faint); }
.trip-sub { font-size: 11.5px; color: var(--sub); margin-top: 4px; line-height: 1.55; }
.trip-detail { display: none; margin-top: 10px; font-size: 12px; line-height: 1.7; background: #f4f2ec; border-radius: 12px; padding: 11px 13px; color: var(--accent); white-space: pre-wrap; }
.trip-item.open .trip-detail { display: block; }

/* feed (algorithmic recommendation stream) */
.feed-tabnote { padding: 12px 18px 4px; font-size: 11.5px; color: var(--sub); line-height: 1.6; }
.feed-card { background: var(--card); margin: 0 14px 10px; border-radius: 18px; overflow: hidden; border: 1px solid var(--line); }
.feed-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 44px; }
.feed-cap { padding: 11px 14px; }
.feed-src { font-size: 10px; color: var(--faint); font-weight: 700; letter-spacing: .04em; }
.feed-txt { font-size: 12.5px; margin-top: 4px; line-height: 1.55; }
.feed-why { font-size: 10.5px; color: var(--clay); margin-top: 7px; font-weight: 600; }
.toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(20px); background: #fff; color: var(--ink); border: 1px solid var(--line); border-radius: 16px; padding: 12px 17px; font-size: 12px; opacity: 0; pointer-events: none; transition: .3s; z-index: 90; width: max-content; max-width: 85%; box-shadow: 0 14px 40px rgba(60,54,46,.2); line-height: 1.55; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast b { color: var(--gold); }
.msg-banner { position: absolute; left: 10px; right: 10px; top: 10px; z-index: 120; display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 20px; background: rgba(250,249,246,.86); backdrop-filter: blur(22px) saturate(1.3); box-shadow: 0 12px 34px rgba(60,54,46,.24); border: 1px solid rgba(255,255,255,.6); opacity: 0; transform: translateY(-130%); transition: transform .42s cubic-bezier(.22,1,.36,1), opacity .3s; pointer-events: none; cursor: pointer; }
.msg-banner.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.msg-banner .mb-av { width: 38px; height: 38px; border-radius: 12px; background-size: cover; background-position: center; flex: none; box-shadow: 0 2px 8px rgba(0,0,0,.14); }
.msg-banner .mb-body { flex: 1; min-width: 0; }
.msg-banner .mb-top { display: flex; align-items: baseline; gap: 6px; }
.msg-banner .mb-name { font-size: 12.5px; font-weight: 700; color: var(--ink); }
.msg-banner .mb-time { font-size: 10px; color: var(--faint); margin-left: auto; flex: none; }
.msg-banner .mb-text { font-size: 12.5px; color: #3a3630; line-height: 1.45; margin-top: 2px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; }

/* ── One UI dock(底欄常駐 4 App,無標籤) ── */
.dock { margin-top: auto; background: rgba(255,255,255,.42); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.55); border-radius: 30px; padding: 13px 8px; display: grid; grid-template-columns: repeat(4, 1fr); }
.dock .appicon .label { display: none; }
.dock .appicon .glyph { width: 55px; height: 55px; border-radius: 16px; }
.mutedic { font-size: 10px; opacity: .55; margin-left: 4px; }
.pinic { font-size: 9px; opacity: .55; margin-left: 3px; }

/* ── purchase(쿠팡 Coupang) ── */

.app-nav.coupang .backbtn, .app-nav.coupang .nav-actions { color: #111; }
.cp-logo { font-weight: 900; font-size: 18px; letter-spacing: -.5px; font-family: Arial, sans-serif; }
.cp-logo i { font-style: normal; }
.cp-logo i:nth-child(1){color:#E52528}.cp-logo i:nth-child(2){color:#F79433}.cp-logo i:nth-child(3){color:#FBC91D}.cp-logo i:nth-child(4){color:#00A862}.cp-logo i:nth-child(5){color:#0074C8}.cp-logo i:nth-child(6){color:#8B57A2}.cp-logo i:nth-child(7){color:#E52528}
.cp-order { background: #fff; margin: 0 14px 10px; border: 1px solid #ececec; border-radius: 14px; padding: 14px 15px; cursor: pointer; }

.cp-eta { margin-top: 6px; font-size: 11px; color: #b25f2e; font-weight: 700; }
.cp-review { margin-top: 6px; font-size: 10.5px; color: #8a8a8a; }
.cp-track { display: flex; align-items: flex-start; margin-top: 12px; }

/* ── delivery(배달의민족 Baemin) ── */

/* ── taxi(카카오 T) ── */
.app-nav.kakaot { background: #FAE100; }
.app-nav.kakaot .backbtn, .app-nav.kakaot .app-title { color: #191919; }

.tx-time { font-size: 10.5px; color: #999; font-weight: 600; margin-bottom: 9px; }
.tx-pt { display: flex; align-items: center; gap: 9px; font-size: 12.5px; font-weight: 600; color: #222; }

/* ── calls(Samsung 전화:排行+最近記錄) ── */

.cl-rank .nm { width: 96px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cl-rank .bar { flex: 1; height: 10px; border-radius: 5px; background: #efece6; overflow: hidden; }
.cl-rank .bar i { display: block; height: 100%; border-radius: 5px; background: var(--sage); min-width: 2px; }
.cl-rank.hot .bar i { background: var(--clay); }
.cl-rank .dur { width: 86px; text-align: right; color: var(--sub); font-size: 10.5px; }

.cl-item { display: flex; align-items: center; gap: 11px; background: var(--card); margin: 0 14px 7px; border-radius: 14px; padding: 12px 14px; border: 1px solid var(--line); cursor: pointer; flex-wrap: wrap; }
.cl-dir { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; background: #eaf2ec; color: #4c7a4f; flex-shrink: 0; }
.cl-dir.out { background: #e9eef6; color: #3b5d8f; }
.cl-dir.miss { background: #f8e9e7; color: #c0392b; }
.cl-meta { flex: 1; min-width: 0; }
.cl-name { font-size: 13px; font-weight: 700; }
.cl-sub { font-size: 10.5px; color: var(--sub); margin-top: 2px; }
.cl-time { font-size: 10px; color: var(--faint); }

/* ── ledger(토스 Toss 記帳) ── */

.ts-total { font-size: 27px; font-weight: 800; margin-top: 4px; letter-spacing: -.02em; color: #191f28; }

.price-cards { display: flex; gap: 8px; margin-top: 16px; }

<script>
/* ═══ i18n ═══ */
let LANG = 'zh';
const T = (ko, zh) => ({ ko, zh });
const tx = o => (typeof o === 'string' ? o : (o && (o[LANG] ?? o.ko)) || '');
const tx0 = (o, l) => (typeof o === 'string' ? o : (o[l] ?? o.ko));
// 純中文 demo 兜底：若字串仍混入韓文諺文，日期分隔線就退回中性中文，不讓韓文露出。
const zhOnly = s => (s && /[\uac00-\ud7a3]/.test(s)) ? '昨天' : s;

/* ════════════════════════════════════════════════════════════════════
 * APP_REGISTRY — 全部 App 的「單一數據源」。上/下架一個 App 只改這裡一行。
 * ⚠️ 同源約定：本清單必須與後端 app/apps.config.json 的 apps[] 保持一致
 *   （id/type/name/surface/pay 對齊）。前端為離線可用內嵌一份副本；線上時
 *   PAID_LOCK 會被後端 /api/phone_check/tiers 覆蓋，兩邊漂移會導致鎖態不一致。
 * 派生：APP_META / STORE_IDS / PAID_LOCK / GRANULAR_PAY 皆由本清單自動生成。
 * 欄位：
 *   id       唯一鍵（前後端一致）
 *   type     渲染器（見 _renderAppBody 的 a.type 分發；能套 'list' 就零渲染代碼）
 *   icon     桌面 fallback emoji（精緻圖示另見 ICON[id]）
 *   name     T(ko, zh) 顯示名
 *   bg       App 磚底色（商城列 / 圖示 fallback）
 *   surface  'home'=桌面圖示 | 'store'=收進應用商城
 *   pay      'free'   免費看
 *            'chat'   聊天專用付費（chatUnlocked，機制獨立於 PAID_LOCK）
 *            'bundle' 整包解鎖（進 App 彈付費窗，一次解鎖全部）
 *            'granular' 單項付費（進門免費、付費點在單張/單次，不彈整包窗）
 * 注意：順序 = home 組(現桌面序) + store 組(現商城序)，確保派生結果與舊表一致。
 * ════════════════════════════════════════════════════════════════════ */
const APP_REGISTRY = [

function seedChat() {

  return seed ? seed.map(m => ({ ...m, opening: true, seed: true })) : [];

async function loadLiveChat() {
  const c = LC.char, rid = LC.rid;
  // 離線 / 無真實後端：直接用種子對話墊底。
  if (!S.online || !rid) { LC.sessionId = null; LC.msgs = seedChat(); LC.loaded = true; renderLiveChat(); return; }
  // 純中文 demo：開場一律用中文種子對話，不拉後端可能殘留的舊(韓文)歷史；
  // 玩家真正發訊息時 sessionId=null 會開新會話，AI 回覆照常走後端。
  if (DEMO_LOCAL_CONTENT) { LC.sessionId = null; LC.msgs = seedChat(); LC.loaded = true; renderLiveChat(); return; }
  try {
    const latest = await fetch('/api/chat/' + rid + '/latest?mode=normal').then(x => x.ok ? x.json() : null);
    const session = latest && latest.session;
    const flat = session && session.messages ? lcFlatten(session.messages) : [];
    // 優先真實有效 session（角色有實際回覆）→ 其次後端開場白 → 最後種子對話兜底。
    // 殘破 session（空 assistant 佔位）不採用，避免頂掉更完整的開場白/種子。
    if (lcHasContent(flat)) {
      LC.sessionId = session.session_id;
      LC.msgs = flat;
    } else if (latest && latest.opening && latest.opening.length) {
      LC.sessionId = null;
      LC.msgs = latest.opening.map(it => ({ who: 'them', item: it, opening: true }));
    } else {
      LC.sessionId = null;
      LC.msgs = seedChat();

// session 是否有效：至少有一條「角色」氣泡帶實際文本。

// 這樣殘破的測試 session 不會頂掉完整開場白。
function lcHasContent(flat) {
  return (flat || []).some(m => m.who !== 'me'
    && !!(lcItemText(m.item) || '').replace(/<[^>]*>/g, '').trim());

// 把後端 session.messages(user 文本 / assistant items[]) 拍平成氣泡序列
function lcFlatten(messages) {
  const out = [];
  (messages || []).forEach(m => {
    if (m.role === 'user') { out.push({ who: 'me', text: m.content || '' }); return; }
    (Array.isArray(m.items) ? m.items : []).forEach(it => out.push({ who: 'them', item: it, opening: !!m.is_opening }));
  });
  return out;
}

function lcItemText(it) {
  const type = (it && it.type) || 'text';
  const d = (it && it.data) || {};
  if (type === 'text') return escHtml(d.content || '');
  if (type === 'voice') return `🎙 ${escHtml(d.content || '')}`;
  if (type === 'sticker') return `🩹 ${escHtml(d.desc || d.scene || 'sticker')}`;
  if (type === 'image') return `🖼 ${escHtml(d.description || 'photo')}`;
  if (type === 'music') return `🎵 ${escHtml(d.content || '')}`;
  if (type === 'state_update') return `<i>${escHtml(d.status || d.emotion || '狀態更新')}</i>`;

async function liveChatSend(e) {

    }).then(x => { if (!x.ok) throw new Error('http ' + x.status); return x.json(); });

// 拉後端 runtime：把日程 phone_update 併進免費層、鎖屏推送、紅點、已解鎖付費 App
async function syncRuntime(id) {
  const rid = REAL_ID[id];
  if (!S.online || !rid) return;
  try {
    // 先把最新日程併進 dossier（免費層），再拉 runtime
    await fetch('/api/phone_check/apply_schedule/' + rid, { method: 'POST' }).catch(() => {});
    const rt = await fetch('/api/phone_check/runtime/' + rid).then(x => x.ok ? x.json() : null);
    if (!rt) return;
    // 進入偷看 session（重置風險/被抓/輪數）
    fetch('/api/phone_check/enter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ char_id: rid, session_id: '' }),
    }).catch(() => {});
    const c = CHARS.find(x => x.id === id);
    if (!c) return;
    // 已生成的付費 App 標記為 ready（開啟時不必再等生成）
    const ready = S.paidReady[id] || (S.paidReady[id] = new Set());
    (rt.paid_apps || []).forEach(k => ready.add(k));
    // 重新拉一次內容（apply_schedule 可能改了 talk/footprints/feed）
    await refreshCharContent(id);
    const sc = CHARS.find(x => x.id === id); if (sc) S.char = sc;
    const snap = rt.schedule || {};
    if (snap.lock_time) S.char.time = snap.lock_time;
    if (snap.date_label) S.char.date = snap.date_label;
    // 鎖屏推送：日程推送優先，接到 lockNotis
    if (Array.isArray(snap.notifications) && snap.notifications.length) {
      S.char.lockNotis = snap.notifications.map(n => ({
        icon: n.icon || '🔔', app: n.app || '手机', time: n.time || '刚刚', text: n.text || '',
      }));
    }
    // 紅點：把 schedule.app_badges 疊加到對應 App 的 badge
    const badges = snap.app_badges || {};
    (S.char.apps || []).forEach(a => {
      if (badges[a.id]) a.badge = (a.badge || 0) + badges[a.id];
    });
    // 角色當前狀態：暫離 / 在玩手機（解鎖後決定進主頁還是進 TA 正在的界面）
    S.phoneState[id] = snap.phone_state || { mode: 'away', app: '' };
  } catch (e) { /* 靜默降級 */ }
}

// 花券生成新一批動態：把當前內容快照存入歷史 → 生成/併入新內容 → 重渲染。
function genNewContent(appId) {
  const c = S.char, key = c.id + ':' + appId, app = c.apps.find(a => a.id === appId);
  if (S.appGening[key]) return;
  spendTicket(async () => {
    S.appGening[key] = true; renderApp();
    // 先把「當前這批」存進歷史，供回看
    const snap = snapshotAppData(app);
    (S.appHistory[key] = S.appHistory[key] || []).unshift({
      time: S.appUpdated[key] || Date.now(),
      label: (S.appHistory[key].length ? '' : (LANG==='ko'?'해금 당시':'解鎖當時')),
      snapshot: snap,
    });
    let ok = false;
    try { ok = await fetchNewBatch(appId, app); } catch (e) { ok = false; }
    if (!ok) mockNewBatch(appId, app);   // 離線/失敗 → 前端模擬一批新動態
    S.appUpdated[key] = Date.now();
    S.appGening[key] = false;
    renderApp();
    toast(`✨ ${tx(app.name)} · ${LANG==='ko'?'새 소식이 도착했다':'有新動態了'}`, 2600);
  }, (LANG==='ko'?'새 소식 생성 · ':'生成新動態 · ') + tx(app.name));
}

async function fetchNewBatch(appId, app) {
  const rid = REAL_ID[S.char.id];
  if (!S.online || !rid) return false;
  const genKey = (appId === 'sns') ? 'sns_alt' : appId;
  const r = await fetch('/api/phone_check/regenerate', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ char_id: rid, app_id: genKey }),
  }).then(x => x.ok ? x.json() : null).catch(() => null);
  if (!r || !r.ok || !r.result) return false;
  await refreshCharContent(S.char.id);
  const fresh = CHARS.find(x => x.id === S.char.id);
  if (fresh) { S.char = fresh; appState.app = fresh.apps.find(a => a.id === appId) || appState.app; }
  return true;
}

function renderSnapshotFull(snap) {
  const groups = [];
  Object.keys(snap || {}).forEach(k => {
    const arr = snap[k];
    if (!Array.isArray(arr) || !arr.length) return;
    const items = arr.map(it => {
      const title = tx(it && (it.t || it.title || it.q || it.name || it.text || it.cap || it.memo)) || '—';
      const sub = tx(it && (it.d || it.s || it.sub || it.why || it.meta || it.desc)) || '';
      const amt = it && (it.amt || it.fare || it.price);
      const time = tx(it && (it.time || it.date || it.len)) || '';
      return `<div class="histp-item ${it && it.hot?'hot':''}">
        <div class="histp-it-top"><span class="histp-it-t">${escHtml(title)}</span>
          ${amt?`<span class="histp-it-amt">${escHtml(String(amt))}</span>`:(time?`<span class="histp-it-time">${escHtml(time)}</span>`:'')}</div>
        ${sub?`<div class="histp-it-sub">${escHtml(sub)}</div>`:''}</div>`;
    }).join('');
    groups.push(`<div class="histp-group"><div class="histp-gk">${escHtml(SNAP_LABEL[k]||k)}</div>${items}</div>`);
  });
  return groups.join('') || `<div class="histp-empty dim">${LANG==='ko'?'(내용 없음)':'(無內容)'}</div>`;
}
const SNAP_LABEL = {

// 從快照抽取 3-5 行人類可讀摘要（跨 app 通用：取常見文本字段）。
function summarizeSnapshot(snap) {
  const out = [];
  const pick = it => tx(it && (it.t || it.title || it.q || it.name || it.text || it.cap || it.memo)) || '';
  ['cards','recent','trips','txns','orders','items','memos','logs','notes','stats','playlists'].forEach(k => {

}

const CHAT_FOLDERS = [

function isArchivedRoom(room) {
  return Boolean(room && room.archived);
}

function chatFolderRooms(rooms, folder) {
  const activeRooms = rooms.filter(r => !isArchivedRoom(r));
  if (folder === 'unread') return activeRooms.filter(r => Number(r.unread || 0) > 0);
  if (folder === 'favorite') return activeRooms.filter(r => r.pinned || r.isUser);
  if (folder === 'archive') return rooms.filter(isArchivedRoom);
  return activeRooms;
}

function chatFolderCount(rooms, folder) {
  if (folder === 'unread') return chatFolderRooms(rooms, folder).reduce((n, r) => n + Number(r.unread || 0), 0);
  return chatFolderRooms(rooms, folder).length;
}

function setChatFolder(folder) {
  appState.chatFolder = folder;

// 若發到「我(玩家)」房 → 標記 selfInject，退出偷看回實時聊天時作為「他主動發來」帶回。
function sendAsChar() {
  const r = appState.room;
  const ta = $('asMeInput');
  const dm = r.msgs.find(m => m.inputDraft);
  const draft = r.draft || (dm && dm.inputDraft);

  if (!text || r._sentDraft) return;
  spendTicket(() => {
    r._sentDraft = text;
    r._sentEdited = !!(draft && text !== tx(draft));   // 是否被玩家改寫過
    r.draft = ''; if (dm) dm.inputDraft = '';

    r._replyPending = !r.isUser;           // 發到「我」房不等對方回覆（留給實時聊天承接）
    renderChatRoom($('view-app'), S.char, appState.app);

// 對方回覆：混合引擎。發到「我」房不喚對方回覆（留給實時聊天承接）。
async function asCharReply(r, sentText) {
  if (r.isUser) {
    r._replyPending = false;
    renderChatRoom($('view-app'), S.char, appState.app);
    toast(LANG==='ko' ? '🎭 그의 이름으로 — 너에게 보냈다. 채팅으로 돌아가 확인해봐.'
                      : '🎭 以他之名 — 發給了你自己。回聊天看看。', 3200);
    return;
  }
  const fallback = r.replyOnSend
    || (LANG==='ko' ? '어? 방금 뭐라고… 폰 잠깐 뒀었는데.' : '欸？你剛剛說什麼…我手機放著沒看。');
  let reply = fallback;
  try {
    const rid = REAL_ID[S.char.id];
    if (S.online && rid) {
      const who = tx(r.name);
      const prompt = (LANG==='ko'
        ? `[상황극] 너는 지금 '${who}'에게 메시지를 보냈다: "${sentText}". '${who}'의 말투로 한 문장만 자연스럽게 답해줘.`
        : `[情境] 你剛給「${who}」發了訊息：「${sentText}」。用「${who}」會有的口吻，自然地回一句話就好。`);
      const rr = await fetch('/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ char_id: rid, message: prompt, session_id: '', mode: 'aside' }),
      }).then(x => x.ok ? x.json() : null);
      const msgs = (rr && rr.session && rr.session.messages) || [];
      const flat = lcFlatten(msgs).filter(m => m.who !== 'me');
      const last = flat.length ? lcItemText(flat[flat.length - 1]).replace(/<[^>]*>/g, '') : '';
      if (last && last.trim()) reply = last.trim();
    }
  } catch (e) { /* 回退預設 */ }
  if (!appState.app) return;
  r._replyPending = false;
  r.msgs.push({ who: 'them', t: reply, time: LANG==='ko'?'방금':'剛剛', _new: true });
  r.unread = (r.unread || 0) + 1;
  if (appState.room === r) renderChatRoom($('view-app'), S.char, appState.app);
  else toast(`💬 <b>${tx(r.name)}</b><br>${escHtml(reply)}`, 3200);
}

const WAVE = {

  const c = S.char, p = appState.app.photos[tab][i], key = c.id + ':' + tab + 'ph' + i;

// 呼叫後端生圖 endpoint，輪詢任務直到拿到 URL（最多約 60s）。離線/無後端回傳 null。
async function requestPhoto(photoId, caption) {
  const rid = REAL_ID[S.char.id];
  if (!S.online || !rid) return null;
  const start = await fetch('/api/phone_check/photo', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ char_id: rid, photo_id: photoId, caption }),
  }).then(x => x.ok ? x.json() : null).catch(() => null);
  const tid = start && start.task_id;
  if (!tid) return null;
  for (let n = 0; n < 40; n++) {
    await new Promise(r => setTimeout(r, 1500));
    const t = await fetch('/api/tasks/' + tid).then(x => x.ok ? x.json() : null).catch(() => null);
    if (!t) continue;
    if (t.status === 'done') return (t.result && t.result.url) || null;
    if (t.status === 'error') return null;
  }
  return null;
}

/* ── search (Naver: 검색 + 브라우징 기록, 실제 검색 가능) ── */
function nvSetTab(t) { appState.nvTab = t; appState.nvSubmitted = ''; renderApp(); }
function nvOnInput(val) {
  appState.nvQuery = val;
  const host = $('nvBody');
  if (host) host.innerHTML = nvBodyHTML(appState.app);
  const x = $('nvClear'); if (x) x.style.display = val ? 'block' : 'none';
}
function nvClear() { appState.nvQuery = ''; appState.nvSubmitted = ''; renderApp(); const el=$('nvInput'); if(el) el.focus(); }
function nvSubmit(term) {
  const q = (term != null ? term : appState.nvQuery || '').trim();
  if (!q) return;
  const c = S.char;
  const paid = S.searchPaid[c.id] || (S.searchPaid[c.id] = new Set());
  const key = q.toLowerCase();
  const doSearch = () => {
    paid.add(key);
    appState.nvQuery = q; appState.nvSubmitted = q; appState.nvTab = 'history';
    renderApp();
  };
  // 命中他已有的搜尋記錄 → 免費看;替他搜一個新詞(尤其搜自己) → 付費
  const items = appState.app.items || [];
  const isHistory = items.some(it => { const t = (tx(it.t)||'').toLowerCase(); return t.includes(key) || key.includes(t); });
  if (isHistory || paid.has(key) || !PAYWALL_ON) { doSearch(); return; }
  openModal(`
    <div class="m-emoji">🔎</div>
    <div class="m-title">${LANG==='ko'?'대신 검색하기':'替他搜這個'}</div>
    <div class="m-body">${LANG==='ko'?'그의 기록에 없는 검색어예요. 지금 당신이 그를 대신해 검색합니다.':'這不是他查過的詞。現在，是你替他在搜。'}</div>
    <button class="m-cta" onclick="closeModal(); spendTicket(nvDoPaidSearch, '${escHtml(q).replace(/'/g,'')}')">🎟 ${tx(UI.lockedApp)}</button>
    <button class="m-sub-cta" onclick="closeModal()">${tx(UI.later)}</button>`);
  S._pendingSearch = { q, key };
}
function nvDoPaidSearch() {
  const c = S.char, ps = S._pendingSearch; if (!ps) return;
  (S.searchPaid[c.id] || (S.searchPaid[c.id] = new Set())).add(ps.key);
  appState.nvQuery = ps.q; appState.nvSubmitted = ps.q; appState.nvTab = 'history';
  S._pendingSearch = null; renderApp();
}
function nvKey(e) { if (e.key === 'Enter') nvSubmit(); }
function nvResultCard(q, a) {
  // 命中既有搜尋記錄 → 展示對應詳情;否則給一個擬真「搜尋結果」占位
  const items = a.items || [];
  const hit = items.find(it => (tx(it.t)||'').toLowerCase().includes(q.toLowerCase()) || q.toLowerCase().includes((tx(it.t)||'').toLowerCase()));
  if (hit && hit.d) {
    return `<div class="nv-result">
      <div class="nv-result-tag">${LANG==='ko'?'통합검색':'綜合搜尋'} · "${escHtml(q)}"</div>
      <div class="nv-result-hit">🔎 ${LANG==='ko'?'이 검색은 그의 기록에 있었다':'這個搜尋,他查過'}</div>
      <div class="nv-result-d">${tx(hit.d)}</div>
    </div>`;
  }
  return `<div class="nv-result">
    <div class="nv-result-tag">${LANG==='ko'?'통합검색':'綜合搜尋'} · "${escHtml(q)}"</div>
    <div class="nv-result-empty">${LANG==='ko'?'그의 기록에 없는 검색어다. — 지금 네가 대신 검색하고 있다.':'這不是他查過的詞——現在是你替他在搜。'}</div>
  </div>`;
}
function nvBodyHTML(a) {
  const items = a.items || [];
  const browse = a.browse || [];
  const tab = appState.nvTab || 'history';
  const q = (appState.nvQuery || '').trim();
  const submitted = appState.nvSubmitted;
  // 输入了但未提交 → 联想(过滤历史);提交了 → 结果卡 + 相关历史
  if (q) {
    const matches = items.filter(it => (tx(it.t)||'').toLowerCase().includes(q.toLowerCase()));
    return (submitted ? nvResultCard(submitted, a) : '')
      + `<div class="sec-label">${submitted ? (LANG==='ko'?'관련 검색 기록':'相關搜尋記錄') : (LANG==='ko'?'자동완성':'搜尋建議')}</div>`
      + (matches.length ? matches.map(it => { const i = flatItems.push(it) - 1; return nvHistRow(it, i, q); }).join('')
          : `<div class="nv-sugg" onclick="nvSubmit('${escHtml(q).replace(/'/g,"\\'")}')"><span class="nv-hi">🔍</span><span>${escHtml(q)}</span><span class="nv-sugg-go">${LANG==='ko'?'검색':'搜尋'}</span></div>`);
  }
  if (tab === 'browse') {
    return `<div class="nv-note">${LANG==='ko'?'그가 연 페이지들 — 검색보다 정직한 행동 기록.':'他點開過的頁面——比搜尋更誠實的行為記錄。'}</div>`
      + browse.map(b => { const i = flatItems.push(b) - 1; return `
        <div class="nv-browse ${b.hot?'hotrow':''}" onclick="rowTap(this,${i})">
          <span class="nv-fav" style="background:${b.grad||'#eef2f4'}">${b.emo||'🌐'}</span>
          <div class="nv-hmeta"><div class="nv-ht">${tx(b.t)}</div><div class="nv-hs">${tx(b.site||'')}${b.visits?` · ${tx(b.visits)}`:''}</div></div>
          <span class="nv-htime">${tx(b.time||'')}</span>
          ${b.d?`<div class="row-detail" style="flex-basis:100%">${tx(b.d)}</div>`:''}
        </div>`; }).join('')
      + (browse.length ? '' : `<div class="chat-empty">${LANG==='ko'?'방문 기록이 없어요.':'沒有瀏覽記錄。'}</div>`);
  }
  return `<div class="nv-chips">${items.slice(0,6).map(it=>`<span class="nv-chip" onclick="nvSubmit('${(tx(it.t)||'').replace(/'/g,"\\'")}')">${tx(it.t)}</span>`).join('')}</div>
    <div class="sec-label">${LANG==='ko'?'최근 검색':'最近搜尋'}</div>
    ${items.map(it => { const i = flatItems.push(it) - 1; return nvHistRow(it, i, ''); }).join('')}`;
}
function nvHistRow(it, i, q) {
  return `<div class="nv-hist ${it.hot?'hotrow':''}" onclick="rowTap(this,${i})">
    <span class="nv-hi">🕘</span>
    <div class="nv-hmeta"><div class="nv-ht">${hl(it.t, q)}</div>${it.s?`<div class="nv-hs">${tx(it.s)}</div>`:''}</div>

    ${it.d?`<div class="row-detail" style="flex-basis:100%">${tx(it.d)}</div>`:''}
  </div>`;
}
function renderSearch(v, c, a) {
  const q = appState.nvQuery || '';
  const tab = appState.nvTab || 'history';
  v.innerHTML = statusbar(c.time, c.batt)

/* ── calls(Samsung 전화:本月排行 + 最近記錄) ── */
function callCount(s) {
  // 從 dur 字串（'12회 · 58분' / '12次 · 58分'）粗略抓通話次數;抓不到就看 pct
  const m = String(tx(s.dur) || '').match(/(\d+)\s*(회|次)/);
  if (m) return Number(m[1]);
  return Number(s.pct) > 0 ? 1 : 0;
}
const CALL_LABELS = { in:T('수신','接聽'), out:T('발신','撥出'), miss:T('부재중','未接'), cancel:T('발신 취소','撥出取消') };
function renderCalls(v, c, a) {
  const dirIc = { in: '↙', out: '↗', miss: '✕', cancel: '⤴' };
  const stats = a.stats || [];
  // 排行只放真的有通話的人(0회不進榜);0회的另外用「연락 없음」小卡呈現
  const ranked = stats.filter(s => callCount(s) > 0);
  const maxPct = Math.max(1, ...ranked.map(s => Number(s.pct) || 0));
  v.innerHTML = statusbar(c.time, c.batt) + appHeader(a, LANG==='ko'?'전화':'電話')
    + `<div class="app-body">
      <div class="cl-stats">

          <div class="cl-rank ${s.hot?'hot':''}" onclick="rowTap(this,${i})">
            <span class="cl-rankno">${k+1}</span>
            <span class="nm">${tx(s.name)}</span>
            <div class="bar"><i style="width:${Math.round((Number(s.pct)||0)/maxPct*100)}%"></i></div>
            <span class="dur">${tx(s.dur)}</span>
            ${s.d?`<div class="row-detail">${tx(s.d)}</div>`:''}
          </div>`; }).join('')}
      </div>
      <div class="sec-label">${LANG==='ko'?'최근 기록':'最近通話'}</div>
      ${(a.recent||[]).map((r, ri) => { const i = flatItems.push(r) - 1; const dir = r.dir||'in';
        const rec = r.recording || r.voicemail; const isVm = !!r.voicemail;
        const rkey = c.id + ':call' + ri;
        const recPlayed = S.unlockedApps[rkey];
        return `
        <div class="cl-item" onclick="rowTap(this,${i})">
          <span class="cl-dir ${dir}">${dirIc[dir]||'↙'}</span>

            <div class="cl-sub"><span class="cl-diric ${dir}">${tx(CALL_LABELS[dir]||CALL_LABELS.in)}</span>${r.s?` · ${tx(r.s)}`:''}</div>
          </div>
          <span class="cl-time">${tx(r.time||'')}</span>
          ${rec ? `<div class="cl-rec ${recPlayed?'played':''}" onclick="event.stopPropagation(); playRecording('${rkey}',${ri})">
            <span class="cl-rec-ic">${isVm?'📼':'▶'}</span>
            <span class="cl-rec-t">${isVm?(LANG==='ko'?'음성사서함':'語音信箱'):(LANG==='ko'?'통화 녹음':'通話錄音')} · ${rec.len||''}</span>
            ${recPlayed?'':`<span class="cl-rec-pay">🎟 1</span>`}
          </div>
          ${recPlayed?`<div class="row-detail" style="flex-basis:100%">🔉 ${tx(rec.script)}</div>`:''}` : ''}
          ${r.d?`<div class="row-detail">${tx(r.d)}</div>`:''}
        </div>`; }).join('')}
    </div>`;
}
// 播放通話錄音 / 語音信箱：花券解鎖 → 展開轉錄文本（模擬收聽）。
function playRecording(rkey, ri) {
  if (S.unlockedApps[rkey]) { renderApp(); return; }
  const r = appState.app.recent[ri];
  const rec = r && (r.recording || r.voicemail);
  if (!rec) return;
  spendTicket(() => {
    S.unlockedApps[rkey] = true;
    charTrace().read.push((r.voicemail?(LANG==='ko'?'음성사서함':'語音信箱'):(LANG==='ko'?'통화 녹음':'通話錄音')) + ' · ' + tx(r.name||''));
    renderApp();
  }, r.voicemail?(LANG==='ko'?'음성사서함 재생':'播放語音信箱'):(LANG==='ko'?'녹음 재생':'播放錄音'));
}

          ${a.income?`<div class="ts-io-col in"><span>${tx(a.month||'')} ${LANG==='ko'?'수입':'收入'}</span><b>${a.income}</b></div>`:''}
          <div class="ts-io-col out"><span>${tx(a.month||'')} ${LANG==='ko'?'지출':'支出'}</span><b>${a.total||''}</b></div>
        </div>
        ${a.note?`<div class="ts-note">${tx(a.note)}</div>`:''}
      </div>
      ${tsSection(LANG==='ko'?'수입':'收入', a.incomes, t=>tsRow(t))}
      ${tsSection(LANG==='ko'?'최근 거래':'最近交易', a.txns, t=>tsRow(t))}
      ${tsSection(LANG==='ko'?'자동이체 · 구독':'自動轉帳 · 訂閱', a.autopay, t=>tsRow(t, t.cycle?`🔁 ${tx(t.cycle)}`:''))}
      ${tsSection(LANG==='ko'?'할부':'分期', a.installments, t=>tsRow(t, `${t.monthly||''}/${LANG==='ko'?'월':'月'} · ${tx(t.remain||'')}`))}
      ${tsSection(LANG==='ko'?'투자 · 보유 종목':'投資 · 持倉', a.stocks, t=>tsStock(t))}
      ${tsSection(LANG==='ko'?'받을 돈':'待收款', a.pending, t=>tsRow(t))}
      ${tsSection(LANG==='ko'?'환불':'退款', a.refunds, t=>tsRow(t))}
    </div>`;
}

/* ── generic sectioned list ── */
function renderList(v, c, a) {
  v.innerHTML = statusbar(c.time, c.batt) + appHeader(a)
    + `<div class="app-body">
      ${a.secs.map(sec => `<div class="sec-label">${tx(sec.label)}</div>`
        + sec.items.map(it => { const i = flatItems.push(it) - 1; return rowItem(it, i); }).join('')
      ).join('')}
    </div>`;
}
/* ═══ LLM CONTENT (built by backend generator; replaces mock when present) ═══ */
// 20 個功能的固定元資料（app_id → 渲染器 type / 圖示 / 名稱），與後端 APP_ORDER 對齊。
// 由 APP_REGISTRY 派生：[id, type, icon, name, bg]。buildCharFromContent 用它把後端 JSON 灌進模板。
const APP_META = APP_REGISTRY.map(a => [a.id, a.type, a.icon, a.name, a.bg]);
// 「其他」App：不佔桌面入口，統一收進應用商城；由 surface==='store' 派生。
const STORE_IDS = APP_REGISTRY.filter(a => a.surface === 'store').map(a => a.id);
function inStore(id) { return STORE_IDS.indexOf(id) >= 0; }
// 各 App 的擬真圖示：仿真實韓國 App 的品牌色 + logo 質感（純 CSS/emoji，無外部圖）。
// {bg: 圖示底色/漸層, fg: 前景元素 HTML, dark: 白字狀態欄}
const ICON = {
  talk:       { bg:'#FEE500', fg:`<span class="ic-kko">talk</span>` },
  memo:       { bg:'linear-gradient(160deg,#ffe066,#ffca3a)', fg:`<span class="ic-emoji" style="font-size:23px">📝</span>` },
  sns:        { bg:'radial-gradient(circle at 30% 107%,#fdf497 0,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%)', fg:`<span class="ic-ig"></span>` },
  forum:      { bg:'linear-gradient(160deg,#5b7fa6,#3a5f8a)', fg:`<span class="ic-emoji" style="font-size:22px">🗣️</span>` },
  search:     { bg:'#03C75A', fg:`<span class="ic-naver">N</span>` },
  feed:       { bg:'#FF0000', fg:`<span class="ic-yt"></span>` },
  footprints: { bg:'linear-gradient(160deg,#4CB4F5,#2E7DF6)', fg:`<span class="ic-map">📍</span>` },
  purchase:   { bg:'linear-gradient(160deg,#5b6bff,#3a3af0)', fg:`<span class="ic-emoji">🛍️</span>` },
  market:     { bg:'#FF6F0F', fg:`<span class="ic-daangn">당</span>` },
  ledger:     { bg:'#0064FF', fg:`<span class="ic-toss">toss</span>` },
  voice:      { bg:'linear-gradient(160deg,#2b2b2b,#111)', fg:`<span class="ic-emoji">🎙️</span>` },
  health:     { bg:'#fff', fg:`<span class="ic-health">♥</span>` },
  folder:     { bg:'linear-gradient(160deg,#8fa0b5,#5f7189)', fg:`<span class="ic-emoji">📁</span>` },

  delivery:   { bg:'#2AC1BC', fg:`<span class="ic-baemin">배민</span>` },
  taxi:       { bg:'#FEE500', fg:`<span class="ic-kakaot">T</span>` },
  screen:     { bg:'linear-gradient(160deg,#4c4c56,#2a2a30)', fg:`<span class="ic-emoji">⏳</span>` },
  calls:      { bg:'linear-gradient(160deg,#3ad35b,#26b345)', fg:`<span class="ic-phone">📞</span>` },
  music:      { bg:'#00CD3C', fg:`<span class="ic-emoji" style="font-size:26px">🎵</span>` },
  fortune:    { bg:'linear-gradient(160deg,#4a3874,#241c38)', fg:`<span class="ic-emoji" style="font-size:26px">🔮</span>` },
  calendar:   { bg:'linear-gradient(160deg,#fff 38%,#f4f2ee)', fg:`<span class="ic-cal"><b>${new Date().getDate()}</b></span>` },
  mail:       { bg:'linear-gradient(160deg,#4a9bff,#2f7df6)', fg:`<span class="ic-emoji" style="font-size:24px">✉️</span>` },

function appIcon(a) {
  const ic = ICON[a.id] || { bg: a.bg || '#e6e4e0', fg: `<span class="ic-emoji">${a.icon||'📱'}</span>` };
  return `<span class="glyph" style="background:${ic.bg}">${ic.fg}</span>`;
}

const GENRE_BY_ID = {
  yuwi:  { genre: T('힐링 · 편의점 그 사람','治癒 · 便利店的他'), stagePct: 34, hook: T('새벽 편의점 음향 디자이너','深夜便利店的音效師') },
};

function badgeCount(type, node) {
  // 給 App 圖示一個「有幾條新東西」的紅點：粗略數 unread / hot 條目
  try {
    if (type === 'chat') return (node.rooms||[]).reduce((n,r)=>n+(r.unread||0),0);
    if (type === 'voice') return (node.memos||[]).filter(m=>m.hot).length;
    if (type === 'gallery') { const ph=node.photos||{}; return (ph.deleted||[]).length; }
  } catch(e){}
  return 0;
}

function normalizePassChanged(node) {
  if (!node || !node.pass) return null;
  return {
    pass: String(node.pass),
    lockMsg: node.lock_msg ?? node.lockMsg ?? '',
    hint: node.hint || '',
    reveal: node.reveal || '',
  };
}

// 把後端生成的一個角色內容，組裝成前端 CHARS 需要的物件（zh 純字串 → 用作雙語物件的兜底）
function buildCharFromContent(rc, fallback) {
  const gc = rc.content || {};
  const meta = gc.meta || {};
  const g = GENRE_BY_ID[rc.demo_id] || {};
  const fallbackApps = (fallback && fallback.apps) || [];
  const apps = APP_META.map(([id,type,icon,name,bg]) => {
    const node = (gc.apps || {})[id] || fallbackApps.find(a => a.id === id);
    if (!node) return null;                 // 該功能沒生成且沒有 mock 則不顯示
    return Object.assign({ id, type, icon, name, bg,
      badge: badgeCount(type, node) }, node);
  }).filter(Boolean);
  return {
    id: rc.demo_id,
    name: rc.name || rc.demo_id,
    cover: rc.cover_url || '',
    genre: g.genre || '',
    hook: meta.hook_line || g.hook || '',
    stagePct: Number.isFinite(Number(meta.stage_pct)) ? Number(meta.stage_pct) : (g.stagePct || (fallback && fallback.stagePct) || 30),
    stageLabel: meta.stage_label || '',
    time: meta.time || '23:00', date: meta.date_label || '',
    batt: meta.batt || 60,
    lockMsg: meta.lock_msg || '',
    pass: String(meta.pass || '0000'),
    passOrigin: meta.pass_origin || '',
    hint: meta.hint || '',
    passChanged: normalizePassChanged(meta.pass_changed || (fallback && fallback.passChanged)),
    peekArc: meta.peek_arc || (fallback && fallback.peekArc) || null,
    clues: (gc.clues || []).map(c => ({ id: c.id, icon: c.icon, text: c.text })),
    truth: gc.truth ? {
      emoji: gc.truth.emoji || '🔓', title: gc.truth.title || '',
      body: gc.truth.body || '', next: gc.truth.next || '',
      nextIn: gc.truth.next_in || '',
    } : null,
    apps,
    _generated: true,
  };
}

// DEMO 純中文模式：true = App 內容一律用前端中文 mock，不被後端(可能含韓文)資料覆蓋。
// 仍保留後端能力：實時聊天、生圖、事件上報照常（只是不拿後端 apps 覆蓋 mock）。
const DEMO_LOCAL_CONTENT = true;
function applyContent(data) {
  if (!data || !Array.isArray(data.chars) || !data.chars.length) return false;
  if (DEMO_LOCAL_CONTENT) {
    // 只把後端的封面圖合併進中文 mock（生圖/頭像需要），其餘 App 內容全部保留 mock。
    let touched = false;
    data.chars.forEach(rc => {
      const c = CHARS.find(x => x.id === rc.demo_id);
      if (c && rc.cover_url && !c.cover) { c.cover = rc.cover_url; touched = true; }
    });
    return touched;
  }
  const built = data.chars.filter(rc => rc && rc.content && rc.content.apps)
                          .map(rc => buildCharFromContent(rc, CHARS.find(c => c.id === rc.demo_id)));
  if (!built.length) return false;
  built.forEach(nc => {
    const idx = CHARS.findIndex(c => c.id === nc.id);
    if (idx >= 0) CHARS[idx] = nc; else CHARS.push(nc);
  });
  return true;
}
async function loadContent() {
  // 被後端服務時拉 LLM 生成內容；file:// 直開或未生成 → 靜默保留 mock
  try {
    const t = await fetch('/api/phone_check/tiers').then(r => r.ok ? r.json() : null);
    if (t && Array.isArray(t.paid_lock)) {
      S.online = true;
      // 同源校驗：後端 paid_lock 與前端 APP_REGISTRY 派生的鎖清單漂移時發出警告，
      // 便於發現 apps.config.json 與前端內嵌副本不一致（不阻斷，仍以後端為準）。
      const localLock = APP_REGISTRY.filter(a => a.pay === 'bundle' || a.pay === 'granular').map(a => a.id);
      const miss = localLock.filter(x => !t.paid_lock.includes(x));
      const extra = t.paid_lock.filter(x => !localLock.includes(x));
      if (miss.length || extra.length) console.warn('[app-registry] 前後端付費鎖漂移 · 前端多:', miss, '· 後端多:', extra);
      PAID_LOCK = t.paid_lock;
    }
  } catch (e) {}
  // demo 乾淨重來：刷新頁面 = 清掉上次偷看留下的真實聊天會話（不動預生成的付費內容/生圖）。
  if (S.online) {
    const rid = REAL_ID[SOLO_ID];
    if (rid) await fetch('/api/phone_check/reset_demo', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ char_id: rid }),
    }).catch(() => {});
  }
  try {
    const data = await fetch('/api/phone_check/content').then(r => r.ok ? r.json() : null);
    if (applyContent(data)) render();
  } catch (e) {}
  maybeDeepLink();
}
// 單角色 demo 的唯一角色 id（mock 與後端都只有游嶼）。
const SOLO_ID = 'yuwi';
// 開場：直接落在和游嶼的聊天（真實開場白）。deep link 帶 ?screen=lock 時才直接進鎖屏偷看。
function bootSingleChar() {
  const params = new URLSearchParams(location.search);
  if (params.get('screen') === 'lock') { enterChar(SOLO_ID); return; }
  openLiveChat(SOLO_ID);
}
// loadContent 完成後：此時 S.online 才就緒（tiers 已回）。開場的 bootSingleChar
// 在 online 之前跑，loadLiveChat 會因 !S.online 直接返回空——所以這裡要在拿到真實
// 角色資料後，重新拉一次聊天，把游嶼的開場白/歷史真正載入。
function maybeDeepLink() {
  // 開場落在鎖屏：enterChar 首跑時 S.online 尚未就緒，syncRuntime 早退，
  // 鎖屏的日程推送 / 真實密碼 / 紅點沒補上——online 後在這裡補一次。
  if (S.screen === 'lock' && S.char && S.char.id === SOLO_ID) {
    if (S.online) { syncRuntime(SOLO_ID).then(() => { if (S.screen === 'lock') renderLock(); }); }
    else renderLock();
    return;
  }
  if (S.screen === 'livechat' && LC.char && LC.char.id === SOLO_ID) {
    const fresh = CHARS.find(c => c.id === SOLO_ID);
    if (fresh) LC.char = fresh;
    // 還沒有任何真實訊息（開場離線兜底或空）→ 現在 online 了，重新載入
    if (S.online && LC.rid && !LC.msgs.length) { loadLiveChat(); return; }
    renderLiveChat();
  }
}

/* ═══ INIT ═══ */
function render() {
  if (S.screen === 'hub') renderHub();
  else if (S.screen === 'lock') renderLock();
  else if (S.screen === 'home') renderHome();
  else if (S.screen === 'app') renderApp();
  else if (S.screen === 'livechat') renderLiveChat();
}
$('modalWrap').addEventListener('click', e => { if (e.target === $('modalWrap')) closeModal(); });
// 單角色 demo：跳過選人 hub，開場直接落在和游嶼的聊天（真實開場白）。
bootSingleChar();
loadContent();
</script>
