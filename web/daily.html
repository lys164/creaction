<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>角色日程生产 · 手帐流水线</title>
  <style>
    :root{--bg:#faf9f5;--paper:#fff;--ink:#2a2926;--mut:#89867d;--line:#e8e4db;--line-strong:#d8d2c5;--panel:#f4f1e9;--accent:#c96442;--accent-dark:#af5436;--accent-soft:#fbefea;--green:#56795f;--green-soft:#edf4ed;--shadow:0 10px 32px rgba(47,42,33,.07);font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-size:14px} button,input,textarea{font:inherit} button{cursor:pointer} .app{min-height:100vh;display:grid;grid-template-columns:264px minmax(0,1fr)}
    .sidebar{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;background:var(--paper);border-right:1px solid var(--line)} .side-head{padding:18px 16px 13px;border-bottom:1px solid var(--line)} .links{display:flex;gap:10px;margin-bottom:14px}.links a{font-size:12px;color:var(--mut);text-decoration:none}.links a:hover{color:var(--accent)} h1{font-family:Georgia,"Songti SC",serif;font-size:18px;font-weight:500;margin:0 0 5px}.sub{font-size:12px;color:var(--mut);line-height:1.5}.search{width:100%;margin-top:14px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--bg);outline:none}.search:focus{border-color:var(--line-strong)} .char-list{padding:9px;overflow:auto;flex:1}.char{display:flex;align-items:center;gap:10px;padding:9px;border:1px solid transparent;border-radius:11px;cursor:pointer}.char:hover{background:var(--panel)}.char.on{border-color:#dfb8a9;background:var(--accent-soft)}.avatar{width:37px;height:37px;flex:none;border-radius:50%;background:#efe8dc;overflow:hidden;display:grid;place-items:center;color:var(--mut);font-family:Georgia}.avatar img{width:100%;height:100%;object-fit:cover}.char-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.char-meta{font-size:11px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
    .main{padding:28px clamp(18px,3.8vw,56px) 44px;min-width:0}.empty{max-width:480px;margin:21vh auto;text-align:center;color:var(--mut);line-height:1.8}.empty .icon{font-size:32px;margin-bottom:10px}.head{display:flex;align-items:flex-start;gap:18px;margin:0 auto 20px;max-width:1360px}.head-title{font-family:Georgia,"Songti SC",serif;font-size:26px;font-weight:500;margin:0}.head-sub{margin-top:5px;color:var(--mut);font-size:12px}.head-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}.btn,.mini{border:1px solid var(--line-strong);background:var(--paper);border-radius:9px;color:var(--ink);padding:8px 12px;font-size:12px}.btn:hover,.mini:hover{border-color:var(--accent);color:var(--accent)}.btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-dark);color:#fff}.btn:disabled{background:#ded9cf;border-color:#ded9cf;color:#fff;cursor:default}.context{max-width:1360px;margin:0 auto 16px;padding:13px 15px;background:var(--paper);border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 2px rgba(0,0,0,.015)}.context-title{font-size:12px;color:var(--mut);margin-bottom:9px}.context-grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr)) minmax(190px,2fr);gap:8px}.context input{width:100%;min-width:0;border:1px solid var(--line);border-radius:8px;padding:8px 9px;background:var(--bg);outline:none;font-size:12px}.context input:focus{border-color:var(--line-strong)}
    .stages{max-width:1360px;margin:auto;display:grid;grid-template-columns:repeat(4,minmax(250px,1fr));gap:12px;align-items:start}.stage{min-height:280px;background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.015)}.stage-head{padding:13px 14px 11px;border-bottom:1px solid var(--line);display:flex;gap:9px;align-items:flex-start}.num{width:23px;height:23px;border-radius:50%;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;flex:none}.stage h2{font-size:14px;margin:1px 0 2px}.stage p{margin:0;color:var(--mut);font-size:11.5px;line-height:1.45}.stage-body{padding:12px}.actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}.action-note{font-size:11px;color:var(--mut);line-height:1.55;margin-top:7px}.loading{padding:15px 0;color:var(--mut);font-size:12px}.spin{display:inline-block;width:11px;height:11px;border:2px solid #ead7d0;border-top-color:var(--accent);border-radius:50%;vertical-align:-1px;animation:rot .75s linear infinite}@keyframes rot{to{transform:rotate(1turn)}}
    .month-theme{padding:9px 10px;border-radius:9px;background:var(--panel);font-size:12px;line-height:1.58}.month-label{font-size:11px;color:var(--mut);margin-bottom:3px}.thread{padding:9px 0;border-bottom:1px solid var(--line)}.thread:last-child{border-bottom:0}.thread-top{display:flex;gap:5px;align-items:center}.tag{padding:2px 5px;background:var(--accent-soft);color:var(--accent);font-size:10px;border-radius:4px}.tag.maintain{background:var(--green-soft);color:var(--green)}.thread-name{font-weight:600;font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.thread-note{margin-top:4px;color:var(--mut);font-size:11px;line-height:1.45}.week-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:10px}.week-card{padding:8px;border:1px solid var(--line);border-radius:8px;font-size:11px}.week-card.on{border-color:#dfb8a9;background:var(--accent-soft)}.week-card b{font-size:11.5px}.week-card span{display:block;margin-top:3px;color:var(--mut);line-height:1.4}.week-pick{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}.pick{border:1px solid var(--line-strong);border-radius:999px;background:var(--paper);padding:5px 8px;font-size:11px}.pick.on{background:var(--ink);border-color:var(--ink);color:#fff}.plan-goal{font-weight:600;font-size:12.5px;line-height:1.5}.list{margin:7px 0 0;padding:0;list-style:none}.list li{font-size:11.5px;line-height:1.5;margin:4px 0;padding-left:10px;position:relative}.list li:before{content:"·";position:absolute;left:0;color:var(--accent)}.daily-themes{margin-top:10px}.theme-row{display:grid;grid-template-columns:30px 1fr;gap:7px;padding:6px 0;border-top:1px solid var(--line);font-size:11px}.theme-row b{color:var(--mut);font-size:10px}.theme-row span{display:block;color:var(--mut);margin-top:2px}.checks{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.check{display:flex;align-items:center;gap:3px;padding:4px 6px;border-radius:6px;background:var(--panel);font-size:11px}.check input{margin:0;accent-color:var(--accent)}.tabs{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 8px}.tab{border:0;background:var(--panel);border-radius:7px;padding:5px 8px;font-size:11px}.tab.on{background:var(--accent);color:#fff}.day-state{font-size:11px;color:var(--mut);padding:8px;background:var(--panel);border-radius:8px;line-height:1.5}.slot{position:relative;padding:9px 0 9px 42px;border-bottom:1px solid var(--line)}.slot:last-child{border:0}.slot time{position:absolute;left:0;top:10px;width:35px;color:var(--mut);font-size:9px;line-height:1.15;text-align:right}.slot b{font-size:12px}.slot .loc{font-size:10px;color:var(--mut);margin-left:4px}.slot .detail{font-size:11px;line-height:1.5;margin-top:3px}.echo{font-size:10.5px;color:var(--accent);margin-top:4px}.journal-preview{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:9px;background:#e7e3da}.journal-preview iframe{display:block;width:100%;height:395px;border:0}.journal-empty{font-size:11.5px;color:var(--mut);line-height:1.6;padding:10px 0}.modal{position:fixed;inset:0;background:rgba(36,33,28,.42);z-index:10;padding:5vh 18px;display:none}.modal.show{display:block}.modal-box{max-width:720px;max-height:90vh;overflow:auto;background:var(--bg);margin:auto;border-radius:15px;box-shadow:var(--shadow);padding:18px}.modal-head{display:flex;gap:12px;align-items:center;margin-bottom:14px}.modal-head h3{margin:0;font-size:16px}.modal-head .mini{margin-left:auto}.history-item{padding:11px 0;border-top:1px solid var(--line);font-size:12px}.history-item b{display:block}.history-item span{display:block;color:var(--mut);font-size:11px;margin:4px 0 7px}.toast{position:fixed;z-index:20;bottom:22px;left:50%;transform:translate(-50%,20px);opacity:0;background:#333;color:#fff;border-radius:8px;padding:9px 14px;font-size:12px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}.toast.ok{background:var(--green)}.toast.err{background:#bb463d}
    @media(max-width:1180px){.stages{grid-template-columns:repeat(2,minmax(260px,1fr))}}@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{position:relative;height:auto;max-height:170px}.side-head{padding:12px}.char-list{display:flex;overflow:auto;padding:7px}.char{min-width:150px}.main{padding:19px 12px}.context-grid{grid-template-columns:1fr 1fr}.context-grid input:last-child{grid-column:span 2}.head{margin-bottom:13px}.head-title{font-size:22px}.stages{grid-template-columns:1fr}.stage{min-height:0}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="side-head">
        <div class="links"><a href="/">← 生产链路</a><a href="/feed.html">帖子生产台</a></div>
        <h1>角色日程生产</h1><div class="sub">月规划 → 周规划 → 日程 → 手帐</div>
        <input id="search" class="search" placeholder="搜索角色名 / ID" />
      </div>
      <div id="chars" class="char-list"></div>
    </aside>
    <main class="main">
      <div id="empty" class="empty"><div class="icon">🗓</div>从左侧选择一个角色，开始它独自生活的手帐流水线。</div>
      <section id="workbench" hidden>
        <header class="head"><div><h2 id="charTitle" class="head-title"></h2><div id="charSub" class="head-sub"></div></div><div class="head-actions"><button id="historyBtn" class="btn">🗂 历史</button><button id="exportBtn" class="btn">⤓ 导出</button></div></header>
        <section class="context"><div class="context-title">环境设定 · 月规划与下游步骤共用</div><div class="context-grid"><input id="season" placeholder="季节，如 初夏" /><input id="city" placeholder="城市，如 首尔" /><input id="monthStart" type="date" /><input id="weather" placeholder="天气，如 小雨转晴" /><input id="dialogue" placeholder="近期对话／经历（可选，仅影响角色自己的走向）" /></div></section>
        <section class="stages">
          <article class="stage"><div class="stage-head"><span class="num">1</span><div><h2>月规划</h2><p>生成 4 周骨架，并直接展开第 1 周。</p></div></div><div class="stage-body"><div class="actions"><button id="genMonth" class="btn primary">生成月规划</button><button id="nextMonth" class="btn">承接下个月</button></div><div id="monthOut" class="journal-empty">先选定环境，再生成这个月的生活骨架。</div></div></article>
          <article class="stage"><div class="stage-head"><span class="num">2</span><div><h2>周规划</h2><p>从月骨架选择一周，展开可执行的主题。</p></div></div><div class="stage-body"><div id="weekPick" class="week-pick"><span class="journal-empty">先生成月规划</span></div><div class="actions"><button id="genWeek" class="btn primary" disabled>生成本周规划</button></div><div id="weekOut" class="journal-empty">第 1 周会随月规划一并生成。</div></div></article>
          <article class="stage"><div class="stage-head"><span class="num">3</span><div><h2>日程</h2><p>选定日期后，按周内顺序串行生成。</p></div></div><div class="stage-body"><div id="dayPick" class="checks"><span class="journal-empty">先生成周规划</span></div><div class="actions"><button id="genDays" class="btn primary" disabled>串行生成所选日程</button></div><div id="dayTabs" class="tabs"></div><div id="dayOut" class="journal-empty">日程会承接前一天的真实结果。</div></div></article>
          <article class="stage"><div class="stage-head"><span class="num">4</span><div><h2>手帐</h2><p>把选定日程渲染为可预览的手帐日页。</p></div></div><div class="stage-body"><div id="journalPick" class="checks"><span class="journal-empty">先生成日程</span></div><div class="actions"><button id="genJournals" class="btn primary" disabled>渲染所选手帐</button></div><div id="journalTabs" class="tabs"></div><div id="journalOut" class="journal-empty">手帐会由已生成的日程直接渲染，不会再改写事件。</div></div></article>
        </section>
      </section>
    </main>
  </div>
  <div id="historyModal" class="modal"><div class="modal-box"><div class="modal-head"><h3>历史档案</h3><button id="clearHistory" class="btn">清空</button><button id="closeHistory" class="mini">×</button></div><div id="historyList"></div></div></div>
  <div id="toast" class="toast"></div>
  <script src="daily.js"></script>
</body>
</html>
